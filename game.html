  const introDiv = document.createElement('div');
  introDiv.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,18,12,0.9);border:2px solid #8b7355;border-radius:10px;padding:32px 40px;color:#e8d5b5;font-size:1.3rem;line-height:2;text-align:center;z-index:10;opacity:0;transition:opacity 1.5s;white-space:pre-line';
  introDiv.textContent = '변호사로 벌써 10년을 보냈다.\n앞으로 나는 어떤 길을 걸어가게 될까.';
  es.appendChild(introDiv);
  setTimeout(() => { introDiv.style.opacity = '1'; }, 1500);

  // 클릭하면 인트로 페이드아웃 → 엔딩 VN으로
  introDiv.style.cursor = 'pointer';
  introDiv.onclick = function() {
    introDiv.style.opacity = '0';
    setTimeout(() => {
      introDiv.remove();
      showEndingVN(ending);
    }, 1500);
  };
}

function showEndingVN(ending) {
  // 2. VN 윈도우 설정
  const vnEl = document.getElementById('ending-vn');
  document.getElementById('ending-bg').style.backgroundImage = `url('${ending.bg}')`;
  document.getElementById('ending-face').style.display = 'block';
  document.getElementById('ending-face-img').src = getPlayerFace();
  document.getElementById('ending-speaker').textContent = G.name;

  const gradeLabel = ending.grade ? ` [${ending.grade}]` : '';
  document.getElementById('ending-dialog-title').textContent = '';
  document.getElementById('ending-dialog-text').textContent = ending.commonText;

  // 3. VN 윈도우 페이드인
  setTimeout(() => { vnEl.style.opacity = '1'; }, 500);

  // 4. 클릭 흐름
  let phase = 0;
  window._endingNext = function() {
    phase++;
    if (phase === 1) {
      if (ending.gradeText) {
        document.getElementById('ending-dialog-text').textContent = ending.gradeText;
      } else {
        phase++;
      }
    }
    if (phase === 2) {
      // VN 윈도우 페이드아웃
      vnEl.style.opacity = '0';
      // 스탯 패널 표시
      const statsPanel = document.getElementById('ending-stats-panel');
      const wr = (G.wins+G.losses)>0 ? Math.round(G.wins/(G.wins+G.losses)*100)+'%' : '-';
      document.getElementById('ending-stats-title').textContent = ending.title + gradeLabel;
      const s = G.stats;
      document.getElementById('ending-stats').innerHTML = [
        {label:'법률지식', value:Math.floor(s.lawKnowledge)},
        {label:'변론능력', value:Math.floor(s.debate)},
        {label:'영업력', value:Math.floor(s.sales)},
        {label:'매력', value:Math.floor(s.charm)},
        {label:'관찰력', value:Math.floor(s.observation)},
        {label:'체력', value:Math.floor(s.stamina)},
        {label:'멘탈', value:Math.floor(s.mental)},
        {label:'도덕성', value:Math.floor(s.morality)},
        {label:'사교성', value:Math.floor(s.sociability)},
        {label:'명성', value:Math.floor(s.reputation)},
        {label:'스트레스', value:Math.floor(s.stress)},
        {label:'피로도', value:Math.floor(s.fatigue)},
        {label:'업보', value:Math.floor(s.karma)},
        {label:'자금', value:G.funds.toLocaleString()+'원'},
        {label:'승소율', value:wr},
        {label:'총 승소', value:G.wins+'건'},
        {label:'총 패소', value:G.losses+'건'},
        {label:'경력', value:G.totalMonths+'개월'},
        {label:'결혼', value:G.isMarried?'기혼':'미혼'},
        {label:'자녀', value:G.children&&G.children.length>0?G.children.map(c=>c.name).join(', '):'없음'},
      ].map(st=>`<div style="text-align:center;min-width:70px"><div style="font-size:0.68rem;color:#8899bb">${st.label}</div><div style="font-size:0.95rem;font-weight:700;color:#e0d0a0">${st.value}</div></div>`).join('');
      setTimeout(() => {
        statsPanel.style.display = 'block';
        setTimeout(() => { statsPanel.style.opacity = '1'; }, 50);
      }, 1500);
    }
  };
}

function showWeddingScene(scene, cb) {
  playBGM('love');
  let dlgIdx = 0;
  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  resetModalStyle(true);
  document.getElementById('se-bg').style.backgroundImage = "url('배경/결혼식.webp')";

  function showWedDlg() {
    if (dlgIdx < scene.dialogues.length) {
      const dlg = scene.dialogues[dlgIdx];
      document.getElementById('se-face').style.display = 'block';
      document.getElementById('se-face-img').src = dlg.face;
      document.getElementById('se-dialog').classList.remove('no-face');
      document.getElementById('se-speaker').textContent = dlg.speaker;
      document.getElementById('se-text').textContent = dlg.text;
      dlgIdx++;
      document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="window._wedContinue()">▼ 계속</button>`;
    } else {
      // 결혼 완료 팝업
      document.getElementById('se-face').style.display = 'block';
      document.getElementById('se-face-img').src = scene.charFace;
      document.getElementById('se-speaker').textContent = '';
      document.getElementById('se-text').innerHTML = `<div style="text-align:center;font-size:1.2rem;font-weight:700;color:#ff8888;margin:16px 0">${G.name}과(와) ${scene.wName}이(가) 부부가 되었습니다!</div>`;
      document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="document.getElementById('status-event-modal').style.display='none';playBGM('normal');updateUI();window._wedCb()">확인</button>`;
      window._wedCb = cb;
    }
  }
  window._wedContinue = showWedDlg;
  showWedDlg();
}

function showHospitalScene(scene, cb) {
  let dlgIdx = 0;
  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  document.getElementById('se-bg').style.backgroundImage = "url('"+scene.bg+"')";

  function showHospDlg() {
    if (dlgIdx >= scene.dialogues.length) {
      modal.style.display = 'none';
      cb();
      return;
    }
    const dlg = scene.dialogues[dlgIdx];
    if (dlg.face) {
      document.getElementById('se-face').style.display = 'block';
      document.getElementById('se-face-img').src = dlg.face;
      document.getElementById('se-dialog').classList.remove('no-face');
    } else {
      document.getElementById('se-face').style.display = 'none';
      document.getElementById('se-dialog').classList.add('no-face');
    }
    document.getElementById('se-speaker').textContent = dlg.speaker || '';
    document.getElementById('se-text').textContent = dlg.text;
    dlgIdx++;
    document.getElementById('se-choices').innerHTML =
      `<button class="event-choice" onclick="window._hospContinue()">▼ 계속</button>`;
  }
  window._hospContinue = showHospDlg;
  showHospDlg();
}

function showBirthdayEvent(cb) {
  ensureRomance();
  const datingId = G.romance.dating;
  if (!datingId) { cb(); return; }
  const datingTarget = getRomanceTargets().find(t=>t.id===datingId);
  if (!datingTarget) { cb(); return; }
  const datingName = datingTarget.name;
  const datingFace = datingTarget.face;

  // 선물 선택: 소유하지 않은 쇼핑 아이템 중 랜덤
  const unownedItems = SHOP_ITEMS.filter(i => {
    if (i.gender && i.gender !== G.gender) return false;
    if (getItemCount(i.id) >= (i.max||1)) return false;
    return true;
  });
  let giftItem = null;
  if (unownedItems.length > 0) {
    giftItem = unownedItems[Math.floor(Math.random()*unownedItems.length)];
  }

  // BGM 변경
  const prevBgm = bgmAudio;
  if (bgmAudio) { bgmAudio.pause(); }
  const birthdayBgm = new Audio('bgm/lovetheme2.mp3');
  birthdayBgm.volume = 0.4;
  birthdayBgm.play().catch(()=>{});
  bgmAudio = birthdayBgm;

  const dialogues = [
    {speaker:datingName, face:datingFace, text:G.name+' 생일축하합니다~!'},
    {speaker:G.name, face:getPlayerFace(), text:'고마워.'},
    {speaker:datingName, face:datingFace, text:'이건 선물이야.'},
    {speaker:G.name, face:getPlayerFace(), text:'음...? 선물까지 준비했어? 감동인데. 뭔지 뜯어볼까...?!'},
  ];
  if (giftItem) {
    dialogues.push({speaker:'', face:null, text:giftItem.name+'를 선물로 받았습니다.', isNotice:true});
    dialogues.push({speaker:G.name, face:getPlayerFace(), text:'아니 이런 귀한걸, 너무 고마워'});
    dialogues.push({speaker:datingName, face:datingFace, text:'뭘 이런 걸 가지고. 다시 한 번 축하해.'});
  }

  let dlgIdx = 0;
  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  document.getElementById('se-bg').style.backgroundImage = "url('배경/생일.webp')";

  function showBdayDialogue() {
    if (dlgIdx >= dialogues.length) {
      // 선물 아이템 지급
      if (giftItem) {
        if (!G.inventory[giftItem.id]) G.inventory[giftItem.id] = 0;
        G.inventory[giftItem.id]++;
        // 아이템 효과 적용
        if (giftItem.effects) {
          for (const k in giftItem.effects) {
            if (G.stats[k] !== undefined) {
              G.stats[k] = Math.max(0, Math.min(999, G.stats[k] + giftItem.effects[k]));
            }
          }
        }
      }
      modal.style.display = 'none';
      // BGM 복원
      if (birthdayBgm) { birthdayBgm.pause(); }
      if (G.bgmOn) playRandomBGM();
      cb();
      return;
    }
    const dlg = dialogues[dlgIdx];
    if (dlg.face) {
      document.getElementById('se-face').style.display = 'block';
      document.getElementById('se-face-img').src = dlg.face;
      document.getElementById('se-dialog').classList.remove('no-face');
    } else if (dlg.isNotice) {
      document.getElementById('se-face').style.display = 'none';
      document.getElementById('se-dialog').classList.add('no-face');
    } else {
      document.getElementById('se-face').style.display = 'none';
      document.getElementById('se-dialog').classList.add('no-face');
    }
    document.getElementById('se-speaker').textContent = dlg.speaker || '';
    document.getElementById('se-text').textContent = dlg.text;
    dlgIdx++;
    document.getElementById('se-choices').innerHTML =
      `<button class="event-choice" onclick="window._bdayContinue()">▼ 계속</button>`;
  }
  window._bdayContinue = showBdayDialogue;
  showBdayDialogue();
}

  playBGM('ending');
  const es=document.getElementById('ending-screen');
  es.style.display='block';
  // 집 배경 블러
  const bgMap={oneroom:'원룸.webp',apartment:'아파트.webp',luxury:'최고급아파트.webp'};
  const homeBg=document.getElementById('ending-home-bg');
  homeBg.style.backgroundImage=`url('${bgMap[G.housing]||"원룸.webp"}')`;
  homeBg.style.opacity='1';

  document.getElementById('ending-vn').style.opacity='0';
  document.getElementById('ending-vn').style.display='none';
  // 스탯 패널에 설명 + 스탯 표시
  const statsPanel=document.getElementById('ending-stats-panel');
  document.getElementById('ending-stats-title').textContent=title;
  const wr=(G.wins+G.losses)>0?Math.round(G.wins/(G.wins+G.losses)*100)+'%':'-';
  document.getElementById('ending-stats').innerHTML=
    `<div style="text-align:center;color:#bbccdd;line-height:2;white-space:pre-line;margin-bottom:12px;font-size:0.95rem">${desc}</div>`+
    [{label:'명성',value:Math.floor(G.stats.reputation)},{label:'자금',value:G.funds.toLocaleString()+'원'},
    {label:'승소율',value:wr},{label:'도덕성',value:Math.floor(G.stats.morality)},
    {label:'총 승소',value:G.wins+'건'},{label:'경력',value:G.totalMonths+'개월'},
    {label:'자녀',value:G.children&&G.children.length>0?G.children.map(c=>c.name).join(', '):'없음'},
  ].map(s=>`<div style="text-align:center;min-width:80px"><div style="font-size:0.75rem;color:#8899bb">${s.label}</div><div style="font-size:1.1rem;font-weight:700;color:#e0d0a0">${s.value}</div></div>`).join('');
  statsPanel.style.display='block';
  setTimeout(()=>{statsPanel.style.opacity='1';},300);
}
