      G.romance.affection[datingId] = Math.min(100, G.romance.affection[datingId] + 5);
      G.monthDateDone = true;
      G.dateCount = (G.dateCount||0) + 1;
      applyStatR('stress', -3);
      applyStatR('fatigue', 1);
      // 데이트 이벤트 체크
      const dateEvt = checkDateEvent(datingId, datingName, datingFace);
      if (dateEvt) {
        return {bg:'배경/식당.webp', face:datingFace, speaker:datingName, date:dateStr,
          result:'success', resultLabel:'데이트',
          text:'오늘도 즐거운 하루였어요!',
          changes:['자금 -20만원', `${datingName} 호감도 +5`], bgmMode:'love',
          dateEvent: dateEvt};
      }
      return {bg:'배경/식당.webp', face:datingFace, speaker:datingName, date:dateStr,
        result:'success', resultLabel:'데이트',
        text:'오늘도 즐거운 하루였어요!',
        changes:['자금 -20만원', `${datingName} 호감도 +5`], bgmMode:'love'};
    }
  }

  // 병원 씬
  if (slot.action === 'hospital') {
    // 병이 없는 상태면 그냥 돌려보냄
    if (!G.isSick) {
      return {type:'hospital', bg:'배경/병원.webp', date:dateStr, healed:false,
        dialogues:[
          {speaker:'강민우', face:'캐릭터얼굴/강민우.webp', text:'아프신데 없으신 것 같으니 돌아가세요.'}
        ]};
    }
    // 병원비 5만원
    G.funds -= 50000; statChanges.funds -= 50000;
    const healChance = G.stats.stamina >= 500 ? 100 : (G.stats.stamina / 5);
    const healed = Math.random()*100 < healChance;
    if (healed) {
      G.isSick = false; G.sickMonths = 0;
      return {type:'hospital', bg:'배경/병원.webp', date:dateStr, healed:true,
        dialogues:[
          {speaker:'강민우', face:'캐릭터얼굴/강민우.webp', text:'환자분 괜찮으신가요? 검사하고 치료해보겠습니다.'},
          {speaker:'강민우', face:'캐릭터얼굴/강민우.webp', text:'원인을 찾았습니다. 이제 괜찮으실 거예요.'},
          {speaker:n, face:getPlayerFace(), text:'고맙습니다.'}
        ]};
    } else {
      return {type:'hospital', bg:'배경/병원.webp', date:dateStr, healed:false,
        dialogues:[
          {speaker:'강민우', face:'캐릭터얼굴/강민우.webp', text:'환자분 괜찮으신가요? 검사하고 치료해보겠습니다.'},
          {speaker:'강민우', face:'캐릭터얼굴/강민우.webp', text:'아직도 상태가 안 좋네요. 한 번 더 오셔야 할 것 같아요.'},
          {speaker:n, face:getPlayerFace(), text:'네... 감사합니다.'}
        ]};
    }
  }

  // 해외여행 씬 (첫 날에만 효과 적용, 나머지 날은 일반 여행 처리)
  if (slot.action === 'japanTrip') {
    if (!G._japanTripDone) {
      // 첫 날: 효과 적용
      G._japanTripDone = true; G._japanTripDay = 1;
      applyStatR('stress',-100); applyStatR('observation',10);
      G.funds -= 1000000; statChanges.funds -= 1000000;
      G.overseas_count++;
      return {bg:'배경/일본.webp', face:getPlayerFace(), speaker:n, date:dateStr,
        result:'info', resultLabel:'일본여행', text:'일본에 도착했다!',
        changes:['스트레스 -100','관찰력 +10','자금 -100만원']};
    }
    G._japanTripDay = (G._japanTripDay||1) + 1;
    if (G._japanTripDay >= 3) {
      // 마지막 날: 특별 대사
      return {bg:'배경/일본.webp', face:getPlayerFace(), speaker:n, date:dateStr,
        result:'info', resultLabel:'일본여행', text:'일본여행 너무 즐거웠다. 나마비루 다이스키!', changes:[]};
    }
    return {bg:'배경/일본.webp', face:getPlayerFace(), speaker:n, date:dateStr,
      result:'info', resultLabel:'일본여행', text:'일본에서의 시간이 흘러간다.', changes:[]};
  }
  if (slot.action === 'seaTrip') {
    if (!G._seaTripDone) {
      G._seaTripDone = true; G._seaTripDay = 1;
      applyStatR('stress',-150); applyStatR('observation',15);
      G.funds -= 1000000; statChanges.funds -= 1000000;
      G.overseas_count++;
      return {bg:'배경/동남아.webp', face:getPlayerFace(), speaker:n, date:dateStr,
        result:'info', resultLabel:'동남아여행', text:'동남아에 도착했다!',
        changes:['스트레스 -150','관찰력 +15','자금 -100만원']};
    }
    G._seaTripDay = (G._seaTripDay||1) + 1;
    if (G._seaTripDay >= 4) {
      return {bg:'배경/동남아.webp', face:getPlayerFace(), speaker:n, date:dateStr,
        result:'info', resultLabel:'동남아여행', text:'동남아의 이 향기는 잊지 못할거야.', changes:[]};
    }
    return {bg:'배경/동남아.webp', face:getPlayerFace(), speaker:n, date:dateStr,
      result:'info', resultLabel:'동남아여행', text:'동남아에서의 시간이 흘러간다.', changes:[]};
  }
  if (slot.action === 'europeTrip') {
    if (!G._europeTripDone) {
      G._europeTripDone = true; G._europeTripDay = 1;
      applyStatR('stress',-200); applyStatR('observation',40);
      G.funds -= 2000000; statChanges.funds -= 2000000;
      G.overseas_count++;
      return {bg:'배경/유럽.webp', face:getPlayerFace(), speaker:n, date:dateStr,
        result:'info', resultLabel:'유럽여행', text:'유럽에 도착했다!',
        changes:['스트레스 -200','관찰력 +40','자금 -200만원']};
    }
    G._europeTripDay = (G._europeTripDay||1) + 1;
    if (G._europeTripDay >= 5) {
      return {bg:'배경/유럽.webp', face:getPlayerFace(), speaker:n, date:dateStr,
        result:'info', resultLabel:'유럽여행', text:'어딜 가도 역사유적, 미술관, 박물관, 아름다운 카페.. 꼭 다시 오고 싶다.', changes:[]};
    }
    return {bg:'배경/유럽.webp', face:getPlayerFace(), speaker:n, date:dateStr,
      result:'info', resultLabel:'유럽여행', text:'유럽에서의 시간이 흘러간다.', changes:[]};
  }

  // Regular actions with judge
  const sd = SCENE_DATA[slot.action];
  if (!sd) return null;

  let ai=null;
  for(const ck in EVENING_ACTIONS){const f=EVENING_ACTIONS[ck].items.find(i=>i.id===slot.action);if(f){ai=f;break;}}
  if (!ai) return null;

  const isRest=ai.noJudge;
  let sm=1,stm=1,result='success';
  if(!isRest){const j=judgeAction();sm=j.result==='great'?2:j.result==='fail'?0.5:1;stm=j.result==='fail'?2:1;result=j.result;}

  const changes=[];
  for(const k in ai.effects){
    if(k==='funds'){G.funds+=ai.effects[k];statChanges.funds+=ai.effects[k];}
    else if(STAT_NAMES[k]){const v=ai.effects[k];
      changes.push(...applyStatR(k,(k==='stress'||k==='fatigue')?(v>0?v*stm:v):(v>0?v*sm:v)));}
  }
  if(ai.cost>0){G.funds-=ai.cost;statChanges.funds-=ai.cost;}
  if(slot.action==='gradSchool'){G.gradSchoolCount++;
    if(G.gradSchoolCount>=100&&!G.gradSchoolCompleted){G.gradSchoolCompleted=true;applyStatR('mental',10);applyStatR('reputation',10);changes.push('대학원 수료! 멘탈+10, 명성+10');
      sceneMilestone={title:'대학원 수료',desc:'대학원 과정을 모두 수료하셨습니다!\n멘탈 +10, 명성 +10\n\n이제 박사논문을 작성할 수 있습니다.',bg:'배경/대학원.webp',face:'캐릭터얼굴/법학교수.webp',speaker:'법학교수',text:`${G.name} 변호사, 축하하네! 드디어 수료야. 이제 박사논문을 쓸 차례지.`};}}

  const face=getSceneFace(sd);
  const speaker=getSceneSpeaker(sd);
  const dialogText = sd.text ? t(sd.text) : t(sd[result]);

  return {bg:sd.bg, face, speaker, date:dateStr,
    result, resultLabel:result==='great'?'대성공':result==='success'?'성공':'실패',
    text:dialogText, changes};
}

function judgeAction(){
  if(G.isSick)return{result:'fail',mult:0.5};
  let s=(G.stats.stamina*0.03)+(G.stats.mental*0.03)-(G.stats.fatigue*0.2)-(G.stats.stress*0.3)+(Math.random()*20-10);
  s=Math.max(0,Math.min(100,s+50));
  if(s>=90)return{result:'great',mult:2};if(s>=50)return{result:'success',mult:1};return{result:'fail',mult:0.5};
}
function judgeConsult(){
  let s=(G.stats.sales*0.02)+(G.stats.charm*0.02)-(G.stats.fatigue*0.2)-(G.stats.stress*0.3)+(Math.random()*20-10);
  s=Math.max(0,Math.min(100,s+50));
  if(s>=90)return{result:'great',mult:2};if(s>=50)return{result:'success',mult:1};return{result:'fail',mult:0.5};
}

// Apply stat and return description string
function applyStatR(k,v){
  G.stats[k]=Math.max(0,Math.min(999,G.stats[k]+v));
  if(statChanges[k]!==undefined)statChanges[k]+=v;
  if(Math.abs(v)>=0.1) return [`${STAT_NAMES[k]} ${v>0?'+':''}${v%1===0?v:v.toFixed(1)}`];
  return [];
}
function applyStat(k,v){G.stats[k]=Math.max(0,Math.min(999,G.stats[k]+v));if(statChanges[k]!==undefined)statChanges[k]+=v;}

// ==================== VN SCENE DISPLAY ====================
function showVNScene(idx) {
  execIndex = idx;
  if (idx >= vnScenes.length) { finishMonth(); return; }

  const scene = vnScenes[idx];

  // Handle romance encounter type
  if (scene.type === 'romance') {
    showRomanceScene(scene, () => showVNScene(idx + 1));
    return;
  }

  // Handle male romance event type
  if (scene.type === 'maleRomanceEvent') {
    playBGM('love');
    showMaleRomanceEvent(scene.eventData, () => { playBGM('normal'); showVNScene(idx + 1); });
    return;
  }

  // Handle female romance event type (재사용: 같은 표시/처리 함수)
  if (scene.type === 'femaleRomanceEvent') {
    playBGM('love');
    showMaleRomanceEvent(scene.eventData, () => { playBGM('normal'); showVNScene(idx + 1); });
    return;
  }

  // Handle context event type (new event system)
  if (scene.type === 'contextEvent') {
    showContextEvent(scene.eventDef, () => showVNScene(idx + 1));
    return;
  }

  // Handle wedding type
  if (scene.type === 'wedding') {
    showWeddingScene(scene, () => showVNScene(idx + 1));
    return;
  }

  // Handle birthday type
  if (scene.type === 'birthday') {
    showBirthdayEvent(() => showVNScene(idx + 1));
    return;
  }

  // Handle hospital type
  if (scene.type === 'hospital') {
    showHospitalScene(scene, () => showVNScene(idx + 1));
    return;
  }

  // Handle legacy event type (backward compat)
  if (scene.type === 'event') {
    showVNScene(idx + 1);
    return;
  }

  const vn = document.getElementById('vn-screen');
  vn.style.display = 'flex';

  // BGM 모드 전환
  if (scene.bgmMode && scene.bgmMode !== bgmCurrentMode) {
    playBGM(scene.bgmMode);
  } else if (!scene.bgmMode && bgmCurrentMode !== 'normal') {
    playBGM('normal');
  }

  // Background
  document.getElementById('vn-bg').style.backgroundImage = `url('${scene.bg}')`;

  // Date
  document.getElementById('vn-date').textContent = scene.date;

  // Face
  const faceEl = document.getElementById('vn-face');
  const dialogEl = document.getElementById('vn-dialog');
  if (scene.face) {
    faceEl.style.display = 'block';
    document.getElementById('vn-face-img').src = scene.face;
    dialogEl.classList.remove('no-face');
  } else {
    faceEl.style.display = 'none';
    dialogEl.classList.add('no-face');
  }

  // Speaker
  const speakerEl = document.getElementById('vn-speaker');
  speakerEl.textContent = scene.speaker || '';
  speakerEl.style.display = scene.speaker ? 'block' : 'none';

  // Result badge
  const resultArea = document.getElementById('vn-result-area');
  const rcls = {great:'vn-result-great',success:'vn-result-success',fail:'vn-result-fail',info:'vn-result-info'};
  resultArea.innerHTML = `<span class="vn-result-badge ${rcls[scene.result]||rcls.info}">${scene.resultLabel}</span>`;

  // Dialog text
  document.getElementById('vn-text').textContent = scene.text;

  // Stat changes
  const changesEl = document.getElementById('vn-stat-changes');
  if (scene.changes && scene.changes.length > 0) {
    changesEl.innerHTML = scene.changes.map(c => {
      const cls = c.includes('+') ? 'pos' : (c.includes('-') ? 'neg' : '');
      return `<span class="${cls}">${c}</span>`;
    }).join(' &nbsp; ');
  } else {
    changesEl.innerHTML = '';
  }

  // Wait for click/key
  vnWaiting = true;
}

function advanceVN() {
  if (!vnWaiting) return;
  vnWaiting = false;
  const currentScene = vnScenes[execIndex];
  // 데이트 이벤트가 있으면 표시
  if (currentScene && currentScene.dateEvent) {
    const de = currentScene.dateEvent;
    currentScene.dateEvent = null;
    showDateEvent(de, () => showVNScene(execIndex + 1));
    return;
  }
  // 현재 씬에 마일스톤이 있으면 팝업 표시 후 다음 씬으로
  if (currentScene && currentScene.milestone) {
    const ms = currentScene.milestone;
    currentScene.milestone = null;
    showMilestonePopup(ms, () => showVNScene(execIndex + 1));
    return;
  }
  // 데이트 씬(dateEvent 없는 경우) 후 결혼 조건 체크
  if (currentScene && currentScene.resultLabel === '데이트' && !currentScene._marriageChecked) {
    currentScene._marriageChecked = true;
    if (checkMarriageCondition()) {
      showMarriageEvent(() => showVNScene(execIndex + 1));
      return;
    }
  }
  showVNScene(execIndex + 1);
}

function showMilestonePopup(ms, callback) {

document.addEventListener('DOMContentLoaded', () => {

// ==================== CONTEXT EVENT SYSTEM ====================
let eventCallback=null;
let currentEventDef=null;
let eventDialogueIndex=0;

function showContextEvent(eventDef, cb) {
  eventCallback = cb;
  currentEventDef = eventDef;
  eventDialogueIndex = 0;

  // Resolve face
  const face = eventDef.faceFn ? eventDef.faceFn() : (eventDef.face || null);
  currentEventDef._resolvedFace = face;

  document.getElementById('vn-screen').style.display = 'none';

  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  resetModalStyle(true);
  document.getElementById('se-bg').style.backgroundImage = `url('${eventDef.bg}')`;

  if (face) {
    document.getElementById('se-face').style.display = 'block';
    document.getElementById('se-face-img').src = face;
    document.getElementById('se-dialog').classList.remove('no-face');
  } else {
    document.getElementById('se-face').style.display = 'none';
    document.getElementById('se-dialog').classList.add('no-face');
  }

  showEventDialogue();
}

function showEventDialogue() {
  const evtDef = currentEventDef;
  if (!evtDef) return;

  if (eventDialogueIndex < evtDef.dialogues.length) {
    const dlg = evtDef.dialogues[eventDialogueIndex];
    const speakerText = dlg.speaker.replace(/\{name\}/g, G.name);
    const isPlayer = dlg.speaker === '{name}' || dlg.speaker === G.name;
    // 얼굴 전환: 주인공이 말할때는 주인공 얼굴, 상대방이 말할때는 상대방 얼굴
    const faceEl = document.getElementById('se-face');
    const faceImg = document.getElementById('se-face-img');
    if (isPlayer) {
      faceEl.style.display = 'block';
      faceImg.src = getPlayerFace();
      document.getElementById('se-dialog').classList.remove('no-face');
    } else if (evtDef._resolvedFace) {
      faceEl.style.display = 'block';
      faceImg.src = evtDef._resolvedFace;
      document.getElementById('se-dialog').classList.remove('no-face');
    } else {
      faceEl.style.display = 'none';
      document.getElementById('se-dialog').classList.add('no-face');
    }
    document.getElementById('se-speaker').textContent = speakerText;
    document.getElementById('se-text').textContent = dlg.text.replace(/\{name\}/g, G.name);
    eventDialogueIndex++;
    document.getElementById('se-choices').innerHTML =
      `<button class="event-choice" onclick="showEventDialogue()">▼ 계속</button>`;
  } else {
    // Show choices (prompt 있으면 표시)
    showEventChoices();
  }
}

function showEventChoices() {
  const evtDef = currentEventDef;
  if (!evtDef) return;

  // noChoice 이벤트 (선택지 없이 자동 적용 - 복장자율화2 등)
  if (evtDef.choices.length === 1 && evtDef.choices[0].noChoice) {
    const c = evtDef.choices[0];
    document.getElementById('se-speaker').textContent = '';
    document.getElementById('se-text').textContent = c.text;
    document.getElementById('se-choices').innerHTML =
      `<button class="event-choice" onclick="applyEventChoice(0)"><span class="choice-label">확인</span></button>`;
    return;
  }

  const labels = ['A','B','C'];
  let html = '';
  evtDef.choices.forEach((c, i) => {
    html += `<button class="event-choice" onclick="applyEventChoice(${i})"><span class="choice-label">${labels[i]}.</span> ${c.text}</button>`;
  });

  // 주인공 얼굴 + prompt 표시
  document.getElementById('se-face').style.display = 'block';
  document.getElementById('se-face-img').src = getPlayerFace();
  document.getElementById('se-dialog').classList.remove('no-face');
  document.getElementById('se-speaker').textContent = G.name;
  document.getElementById('se-text').textContent = evtDef.prompt || '어떻게 하시겠습니까?';
  document.getElementById('se-choices').innerHTML = html;
}

function applyEventChoice(choiceIdx) {
  const evtDef = currentEventDef;
  if (!evtDef) return;
  const choice = evtDef.choices[choiceIdx];

  // 수치 변화 추적용
  const changeList = [];

  // Apply basic stat effects
  for (const k in choice.effects) {
    if (k === 'funds') {
      G.funds += choice.effects[k]; statChanges.funds += choice.effects[k];
      const v = choice.effects[k];
      const display = Math.abs(v) >= 10000 ? (v>0?'+':'')+Math.floor(v/10000)+'만원' : (v>0?'+':'')+v+'원';
      changeList.push({name:'자금', value:display, positive: v>0});
    }
    else if (STAT_NAMES[k]) {
      applyStat(k, choice.effects[k]);
      const v = choice.effects[k];
      changeList.push({name:STAT_NAMES[k], value:(v>0?'+':'')+v, positive: (k==='stress'||k==='fatigue'||k==='karma') ? v<0 : v>0});
    }
  }

  // Apply special effects
  if (choice.special) {
    switch(choice.special) {
      case 'forceLose':
        G.nextTrialForceLose = true;
        break;
      case 'forceWin':
        G.nextTrialForceWin = true;
        break;
      case 'forceWinOrDisbar':
        G.nextTrialForceWin = true;
        if (Math.random() < 0.05) {
          // 변호사 자격 박탈 → 게임 엔드
          document.getElementById('status-event-modal').style.display = 'none';
          showEndingCustom('변호사 자격 박탈',
            '위증 협조 사실이 발각되어 변호사 자격이 박탈되었습니다.\n법조계에서의 커리어는 여기서 끝났습니다.\n\n잘못된 선택의 대가는 너무나 혹독했습니다.');
          return;
        }
        break;
      case 'resignCase':
        // 마지막 사건 삭제 + 자금 -300만
        if (G.caseCards.length > 0) {
          G.caseCards.pop();
          G.cases = Math.max(0, G.cases - 1);
          statChanges.cases--;
        }
        G.funds -= 3000000; statChanges.funds -= 3000000;
        break;
      case 'resignCaseRefund':
        // 마지막 사건 삭제 + 수임료 반환 (이번달 수임료 차감)
        if (G.caseCards.length > 0) {
          G.caseCards.pop();
          G.cases = Math.max(0, G.cases - 1);
          statChanges.cases--;
        }
        const refund = Math.floor(G.monthCaseFees * G.caseFeeRate * 0.5);
        if (refund > 0) { G.funds -= refund; statChanges.funds -= refund; }
        break;
      case 'addCase':
        if (G.cases < 60) {
          G.cases++; statChanges.cases++;
          G.yearCases++;
          const card = createCaseCard();
          G.caseCards.push(card);
        }
        break;
      case 'addCasePublic':
        // 공익인권 사건 추가
        if (G.cases < 60) {
          G.cases++; statChanges.cases++;
          G.yearCases++;
          const card = createCaseCard();
          card.typeId = 'publicInterest';
          card.typeName = '공익인권';
          G.caseCards.push(card);
        }
        break;
      case 'addCaseHeesen':
        // 이희선 경유 사건 추가
        if (G.cases < 60) {
          G.cases++; statChanges.cases++;
          G.yearCases++;
          const card = createCaseCard();
          G.caseCards.push(card);
          if (G.gender === 'male') {
            G.heesenRelation += 5;
          }
        }
        break;
      case 'becomeLecturer':
        G.isLecturer = true;
        break;
      case 'bossOrderAccept':
        G.inhouseEval += 10;
        if (Math.random() < 0.05) {
          // 5% 확률 변호사자격박탈
          showEndingCustom('변호사 자격 박탈','상사의 불법 지시에 따른 결과, 변호사 자격이 박탈되었습니다.\n법을 지켜야 할 변호사가 법을 어긴 대가는 혹독했습니다.');
        }
        break;
      case 'inhouseEvalChange':
        G.inhouseEval += (choice.evalDelta || 0);
        break;
      case 'youtubeQuit':
        G.inhouseEval += 10;
        G.youtubeSubscribers = 0;
        G.youtubeStarted = false;
        break;
      case 'youtubeReduce':
        G.inhouseEval += 3;
        G.youtubeSubscribers = Math.max(0, G.youtubeSubscribers - 50000);
        break;
      case 'giveCase':
        if (G.cases > 0 && G.caseCards.length > 0) {
          G.caseCards.pop();
          G.cases = Math.max(0, G.cases - 1);
          statChanges.cases--;
        }
        break;
      case 'riskyInvest':
        G.pendingRiskyInvest = true;
        break;
      case 'reduceKarma5':
        G.stats.karma = Math.max(0, G.stats.karma - 5);
        break;
      case 'pendingResign':
        G.pendingResignInhouse = true;
        break;
      case 'startPregnancy':
        ensureRomance();
        G.isPregnant = true;
        G.pregnancyDay = 0;
        G.pregnancyKnown = false;
        break;
      case 'spouseAffection5':
        ensureRomance();
        if (G.romance.dating) {
          G.romance.affection[G.romance.dating] = Math.min(100, (G.romance.affection[G.romance.dating]||0) + 5);
        }
        break;
      case 'spouseAffectionMinus10':
        ensureRomance();
        if (G.romance.dating) {
          G.romance.affection[G.romance.dating] = Math.max(0, (G.romance.affection[G.romance.dating]||0) - 10);
        }
        break;
      case 'spouseAffection10':
        ensureRomance();
        if (G.romance.dating) {
          G.romance.affection[G.romance.dating] = Math.min(100, (G.romance.affection[G.romance.dating]||0) + 10);
        }
        break;
      case 'spouseAffectionMinus3':
        ensureRomance();
        if (G.romance.dating) {
          G.romance.affection[G.romance.dating] = Math.max(0, (G.romance.affection[G.romance.dating]||0) - 3);
        }
        break;
      case 'councilBribeAccept':
        // 5% 확률로 적발 → 게임 엔드
        if (Math.random() < 0.05) {
          document.getElementById('status-event-modal').style.display = 'none';
          showEndingCustom('뇌물 수수 적발',
            '시의원 재임 중 뇌물 수수 사실이 적발되었습니다.\n변호사 자격이 박탈되고 의원직도 상실했습니다.\n\n잘못된 선택의 대가는 너무나 혹독했습니다.');
          return;
        }
        break;
    }
  }

  // 결과 화면 표시
  showEventResult(evtDef, choice, changeList);
}

function showEventResult(evtDef, choice, changeList) {
  // 주인공 얼굴로 전환

}

  updateUI();
  // Continue normal closeSummary flow
  const canBroadcast = G.status==='partner'||G.status==='senior'||G.status==='solo';
  if(canBroadcast && G.stats.reputation>=700 && !G.monthBroadcastScheduled) {

      showPoliticsEvent(actualYear);

}

// ==================== LECTURER SYSTEM (강사 스카웃) ====================
// 강사 수락시 매주 일요일 법학강의 고정
function applyLecturerSchedule() {
  if (!G.isLecturer) return;
  // G.schedule의 일요일(dow===0) 낮 슬롯을 법학강의로 고정
  G.schedule.forEach(ds => {
    if (ds.dow === 0) {
      ds.slots.forEach(slot => {
        if (slot.time === 'day') {
          slot.action = 'lectureLaw';
          slot.label = '법학강의';
          slot.slotClass = 'slot-study';
          slot.locked = true;
        }
      });
    }
  });
}

// ==================== MONTH END ====================
function finishMonth(){
  // 월급 (휴업/개업은 0)
  if (G.status !== 'suspended' && G.status !== 'solo') {
    G.funds += G.salary; statChanges.funds += G.salary;
  }
  // 고정지출
  G.funds -= G.fixedExpense; statChanges.funds -= G.fixedExpense;
  // 월간 수임료/성공보수 초기화
  G.monthCaseFees = 0; G.monthSuccessFees = 0;
  // SNS/유튜브 팔로워 증가
  if (G.snsStarted) {
    G.snsFollowers += Math.max(0, Math.floor(G.stats.debate + G.stats.lawKnowledge - G.stats.karma*4));
  }
  if (G.youtubeStarted) {
    G.youtubeSubscribers += Math.max(0, Math.floor(G.stats.charm*3 + G.stats.debate - G.stats.karma*8));
  }
  // 시의원 매월 수입
  ensureRomance(); // 하위호환
  if (G.isCityCouncil) {
    G.funds += 4000000; statChanges.funds += 4000000;
  }
  // 결혼 상태 매월 랜덤 수입
  if (G.isMarried) {
    const spouseIncome = Math.floor(Math.random() * 10000001); // 0~1000만원
    G.funds += spouseIncome;
    statChanges.funds += spouseIncome;
    G.fixedExpense = calcFixedExpense();
  }
  // 임신 경과 처리
  ensureRomance();
  if (G.isPregnant) {
    G.pregnancyDay += 30;

    // 임신 인지 이벤트 (50일 이상 & 아직 모르는 경우)
    if (G.pregnancyDay >= 50 && !G.pregnancyKnown) {
      const spouseTarget = getRomanceTargets().find(t=>t.id===G.romance.dating);
      const spouseName = spouseTarget ? spouseTarget.name : '배우자';
      const spouseFace = spouseTarget ? spouseTarget.face : null;
      G.pregnancyKnown = true;

      let pregDialogues, pregFace;
      if (G.gender === 'male') {
        pregFace = spouseFace;
        pregDialogues = [
          {speaker: spouseName, face: spouseFace, text: G.name+', 나 할 말이 있어.'},
          {speaker: G.name, face: getPlayerFace(), text: '무슨 일이야?'},
          {speaker: spouseName, face: spouseFace, text: '나... 우리 아기가 생겼어.'},
          {speaker: G.name, face: getPlayerFace(), text: '정말?!'},
          {speaker: spouseName, face: spouseFace, text: '응. 병원에서 확인했어.'},
          {speaker: G.name, face: getPlayerFace(), text: '와... 정말 기쁘다!'}
        ];
      } else {
        pregFace = '캐릭터얼굴/강민우.webp';
        pregDialogues = [
          {speaker: '강민우', face: '캐릭터얼굴/강민우.webp', text: '축하드립니다. 임신이십니다.'},
          {speaker: G.name, face: getPlayerFace(), text: '네?! 정말요?'},
          {speaker: '강민우', face: '캐릭터얼굴/강민우.webp', text: '네. 약 7주 정도 된 것 같습니다. 축하드려요.'},
          {speaker: G.name, face: getPlayerFace(), text: '감사합니다... 얼른 남편한테 알려야겠다.'}
        ];
      }

      let pregDlgIdx = 0;
      const modal = document.getElementById('status-event-modal');
      modal.style.display = 'flex';
      resetModalStyle(true);
      document.getElementById('se-bg').style.backgroundImage = "url('배경/병원.webp')";

      function showPregDlg() {
        if (pregDlgIdx >= pregDialogues.length) {
          modal.style.display = 'none';
          showToast('임신을 알게 되었습니다!');
          finishMonthAfterPregnancy();
          return;
        }
        const dlg = pregDialogues[pregDlgIdx];
        if (dlg.face) {
          document.getElementById('se-face').style.display = 'block';
          document.getElementById('se-face-img').src = dlg.face;
          document.getElementById('se-dialog').classList.remove('no-face');
        } else {
          document.getElementById('se-face').style.display = 'none';
          document.getElementById('se-dialog').classList.add('no-face');
        }
        document.getElementById('se-speaker').textContent = dlg.speaker || '';
        document.getElementById('se-text').textContent = dlg.text;
        pregDlgIdx++;
        document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="window._pregContinue()">▼ 계속</button>`;
      }
      window._pregContinue = showPregDlg;
      showPregDlg();
      return;
    }

    // 출산 이벤트 (280일 이상)
    if (G.pregnancyDay >= 280) {
      const spouseTarget = getRomanceTargets().find(t=>t.id===G.romance.dating);
      const spouseName = spouseTarget ? spouseTarget.name : '배우자';
      const spouseFace = spouseTarget ? spouseTarget.face : null;

      const birthDialogues = [
        {speaker: '강민우', face: '캐릭터얼굴/강민우.webp', text: '축하드립니다! 건강한 아기입니다!'},
        {speaker: G.name, face: getPlayerFace(), text: '감사합니다...'},
        {speaker: spouseName, face: spouseFace, text: '우리 아기... 너무 예뻐.'},
        {speaker: G.name, face: getPlayerFace(), text: '이름을 뭘로 할까?'}
      ];

      let birthDlgIdx = 0;
      const modal = document.getElementById('status-event-modal');
      modal.style.display = 'flex';
      resetModalStyle(true);
      document.getElementById('se-bg').style.backgroundImage = "url('배경/병원.webp')";

      function showBirthDlg() {
        if (birthDlgIdx >= birthDialogues.length) {
          // 이름 입력 프롬프트
          modal.style.display = 'none';
          showBabyNamePrompt(spouseName, spouseFace);
          return;
        }
        const dlg = birthDialogues[birthDlgIdx];
        if (dlg.face) {
          document.getElementById('se-face').style.display = 'block';
          document.getElementById('se-face-img').src = dlg.face;
          document.getElementById('se-dialog').classList.remove('no-face');
        } else {
          document.getElementById('se-face').style.display = 'none';
          document.getElementById('se-dialog').classList.add('no-face');
        }
        document.getElementById('se-speaker').textContent = dlg.speaker || '';
        document.getElementById('se-text').textContent = dlg.text;
        birthDlgIdx++;
        document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="window._birthContinue()">▼ 계속</button>`;
      }
      window._birthContinue = showBirthDlg;
      showBirthDlg();
      return;
    }
  }

  finishMonthAfterPregnancy();
}

  const existing = document.getElementById('sys-popup');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'sys-popup';

function finishMonthAfterPregnancy(){
  ensureRomance();
  // 연인/배우자 데이트 체크
  ensureRomance();
  if (G.romance.dating && !G.monthDateDone) {
    const did = G.romance.dating;
    if (!G.romance.affection[did]) G.romance.affection[did] = 0;
    const penalty = G.isMarried ? 5 : 10;
    G.romance.affection[did] = Math.max(0, G.romance.affection[did] - penalty);
    const breakupThreshold = G.isMarried ? 40 : 60;
    if (G.romance.affection[did] < breakupThreshold) {
      if (G.isMarried) {
        // 이혼 청구
        G.isMarried = false;
        G.fixedExpense = calcFixedExpense();
      }
      G.brokenUp[did] = true;
      G.romance.dating = null;
    }
  }
  G.monthDateDone = false;
  // 사내변호사 자동 사직 처리
  if (G.pendingResignInhouse) {
    G.pendingResignInhouse = false;
    G.status = 'suspended'; G.salary = 0; G.caseFeeRate = 0; G.successFeeRate = 0;
    G.fixedExpense = 3000000; G.firmId = ''; G.firmName = '';
    G.statusMonths = 0; G.cases = 0; G.caseCards = []; G.inhouseEval = 0;
    showToast('회사를 사직하고 휴업변호사가 되었습니다.');
  }
  // 위험한 투자 결과 처리
  if (G.pendingRiskyInvest) {
    G.pendingRiskyInvest = false;
    if (Math.random() < 0.5) {
      G.funds += 300000000; statChanges.funds += 300000000;
      showToast('투자 대박! 3억원을 회수했습니다!');
    } else {
      showToast('투자 실패... 투자금 1억원을 잃었습니다.');
    }
  }
  // 과로사/질병 체크
  const overworked = G.stats.stress + G.stats.fatigue > G.stats.stamina * 2;
  if(overworked && G.isSick && G.sickMonths >= 2){
    // 과로사 엔딩: 기존 과로사 조건 + 질병 2개월 이상 지속
    document.getElementById('vn-screen').style.display='none';
    const modal = document.getElementById('status-event-modal');
    modal.style.display = 'flex';
    document.getElementById('se-bg').style.backgroundImage = "url('배경/병원.webp')";
    document.getElementById('se-face').style.display = 'block';
    document.getElementById('se-face-img').src = getPlayerFace();
    document.getElementById('se-dialog').classList.remove('no-face');
    document.getElementById('se-speaker').textContent = G.name;
    document.getElementById('se-text').textContent = '아... 너무 아픈데... ';
    document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="document.getElementById('status-event-modal').style.display='none';showEndingCustom('과로사','극심한 스트레스와 피로로 쓰러져 더 이상 변호사 생활을 이어갈 수 없게 되었습니다.')"><span class="choice-label">확인</span></button>`;
    return;
  }
  if(G.stats.stress + G.stats.fatigue > G.stats.stamina){
    const wasHealthy = !G.isSick;
    if(!G.isSick) { G.isSick = true; G.sickMonths = 0; }
    G.sickMonths++;
    if(wasHealthy) {
      // 새로 병에 걸렸을 때 팝업
      showMilestonePopup({title:'질병',desc:'과도한 스트레스와 피로로 병에 걸렸습니다.\n병원에서 치료를 받아야 합니다.',bg:'배경/병원.webp',face:'캐릭터얼굴/강민우.webp',speaker:'강민우',text:'환자분, 무리하셨군요. 빨리 치료를 받으셔야 합니다.',btnLabel:'확인'}, ()=>{ finishMonthFinal(); });
      return;
    }
  }

  finishMonthFinal();
}

function finishMonthFinal(){
  // 월간 리셋
  G.monthMarketingDone = false;
  G.monthPublicDefender = false;
  G.monthLegalAid = false;
  G.monthApplied = false;
  G.monthHireCount = 0;
  G.monthBroadcastScheduled = false;
  G.anniversaryDone = false;
  // 연인/배우자 생일 달에 데이트 안 했으면 호감도 -5
  if (G.romance.dating && !G._partnerBirthdayDone) {
    const targets = getRomanceTargets();
    const dt = targets.find(t=>t.id===G.romance.dating);
    if (dt && dt.birthday) {
      const [bm] = dt.birthday.split('-').map(Number);
      if (bm === G.month) {
        G.romance.affection[G.romance.dating] = Math.max(0, (G.romance.affection[G.romance.dating]||0) - 5);
      }
    }
  }
  G._partnerBirthdayDone = false;
  G._scheduleBuiltFor = null; // 다음달 스케줄 재빌드 허용
  // 대표/개업 상담가능수 증가
  if (G.status === 'senior' || G.status === 'solo') {
    G.consultQuota += Math.floor(G.stats.reputation/100 + G.stats.sales/100);
  }

  // 투자 월간 처리
  processInvestmentsMonthly();
  // 어쏘/직원 월간 처리
  const empReports = processEmployeesMonthly();

  for(const k in G.stats)G.stats[k]=Math.max(0,Math.min(999,G.stats[k]));
  G.statusMonths++;

  // 당선 판정 (출마연도 6월 말)
  if (G.politicsAccepted && G.month === 6) {
    const actualYear = 2029 + G.year;
    if (actualYear === G.politicsOfferedYear) {
      document.getElementById('vn-screen').style.display='none';
      updateUI();
      if (G.politicsSupport > 50) {
        G.isCityCouncil = true;
        G.politicsAccepted = false;
        G.politicsSupport = 0;
        showMilestonePopup({title:'당선',desc:`${G.name} 변호사가 시의회 의원으로 당선되었습니다!`,bg:'배경/의회.webp',face:'캐릭터얼굴/국회의원.webp',speaker:'이소연',text:`${G.name} 의원, 축하합니다! 앞으로 함께 잘 해봅시다.`}, ()=>{showMonthSummary(empReports);});
      } else {
        G.politicsAccepted = false;
        G.politicsSupport = 0;
        showMilestonePopup({title:'낙선',desc:'아쉽게도 당선되지 못했습니다.',bg:'배경/의회.webp',face:getPlayerFace(),speaker:G.name,text:'아쉽지만 다음을 기약해야겠다.'}, ()=>{showMonthSummary(empReports);});
      }
      return;
    }
  }

  document.getElementById('vn-screen').style.display='none';
  updateUI();
  showMonthSummary(empReports);
}

function showMonthSummary(empReports){
  document.getElementById('month-summary').style.display='flex';
  document.getElementById('summary-title').textContent=`${G.year}년차 ${G.month}월 결산`;
  let html='';
  for(const k in STAT_NAMES){const c=statChanges[k]||0;if(Math.abs(c)>=0.1){
    const cls=(k==='stress'||k==='fatigue'||k==='karma')?(c>0?'sneg':'spos'):(c>0?'spos':'sneg');
    html+=`<div class="summary-row"><span class="sname">${STAT_NAMES[k]}</span><span class="schange ${cls}">${c>0?'+':''}${c.toFixed(1)}</span></div>`;
  }}
  // 수입/지출 상세
  if(G.status!=='suspended'&&G.status!=='solo'&&G.salary>0) html+=`<div class="summary-row"><span class="sname">월급</span><span class="schange spos">+${G.salary.toLocaleString()}원</span></div>`;
  if(G.isCityCouncil) html+=`<div class="summary-row"><span class="sname">시의원 수당</span><span class="schange spos">+4,000,000원</span></div>`;
  html+=`<div class="summary-row"><span class="sname">고정지출</span><span class="schange sneg">-${G.fixedExpense.toLocaleString()}원</span></div>`;
  if(statChanges.funds){const cls=statChanges.funds>0?'spos':'sneg';
    html+=`<div class="summary-row" style="border-top:1px solid #3a3020;padding-top:4px"><span class="sname" style="font-weight:700">자금 합계</span><span class="schange ${cls}" style="font-weight:700">${statChanges.funds>0?'+':''}${statChanges.funds.toLocaleString()}원</span></div>`;}
  if(statChanges.preparation){html+=`<div class="summary-row"><span class="sname">준비도</span><span class="schange spos">+${statChanges.preparation.toFixed(1)}</span></div>`;}
  // 직원 리포트
  if (empReports && empReports.length) {
    html += `<div style="border-top:1px solid #3a3020;margin-top:8px;padding-top:6px;font-size:0.72rem;font-weight:700;color:#a09060;margin-bottom:4px">어쏘/직원 활동</div>`;
    empReports.forEach(r => { html += `<div class="summary-row"><span class="sname ${r.cls}" style="font-size:0.72rem">${r.text}</span></div>`; });
  }
  document.getElementById('summary-changes').innerHTML=html;
}

function closeSummary(){
  document.getElementById('month-summary').style.display='none';
  G.monthReviewCount = 0; // 매월 검토 횟수 리셋
  G.month++;
  if(G.month>12){
    G.month=1; G.year++;
    G.lastYearCases = G.yearCases; G.yearCases = 0;
    G.yearCaseSeq = 0; // 연도별 사건번호 리셋
  }
  G.totalMonths++;
  if(G.year>10){showEnding();return;}
  if(G.stats.stress>900&&G.stats.fatigue>900){showEndingCustom('번아웃 은퇴','극심한 스트레스와 피로로 인해 더 이상 변호사 생활을 이어갈 수 없게 되었습니다.\n건강을 되찾기 위해 조용히 법조계를 떠났습니다.');return;}
  if(G.funds<-10000000){showEndingCustom('파산','자금이 바닥나 더 이상 변호사 활동을 유지할 수 없게 되었습니다.\n빚을 갚기 위해 다른 길을 찾아야 했습니다.');return;}
  updateUI();

  // 사내변호사 승진 체크
  if (G.status==='inhouse' && G.inhouseEval>=300) {
    G.status = 'inhouseTeam'; G.salary += 3000000;
    showMilestonePopup({title:'승진',desc:'내부 평가가 우수하여 팀장으로 승진하셨습니다!\n월급 +300만원',bg:'배경/대기업.webp',face:'캐릭터얼굴/기업임원.webp',speaker:'상사',text:`${G.name} 변호사, 축하하네. 자네의 성과가 인정받아 팀장으로 승진하게 됐어. 앞으로도 잘 부탁하네.`}, ()=>{});
    return;
  }
  if (G.status==='inhouseTeam' && G.inhouseEval>=700) {
    G.status = 'inhouseExec'; G.salary += 10000000;
    showMilestonePopup({title:'승진',desc:'탁월한 성과로 임원으로 승진하셨습니다!\n월급 +1000만원',bg:'배경/대기업.webp',face:'캐릭터얼굴/기업임원.webp',speaker:'상사',text:`${G.name} 이사, 축하하네. 이제 임원이야. 회사의 미래를 함께 이끌어주게.`}, ()=>{});
    return;
  }

  // 세무조사 체크 (매월 1일, 재산 50억+ & 최고급아파트, 3%)
  if (G.funds >= 5000000000 && G.housing === 'luxury' && Math.random() < 0.03) {
    showTaxAuditEvent();
    return;
  }

  // 방송 섭외 체크 (명성 700 이상, 파트너/대표/개업만)
  const canBroadcast = G.status==='partner'||G.status==='senior'||G.status==='solo';
  if(canBroadcast && G.stats.reputation>=700 && !G.monthBroadcastScheduled) {
    const chance = (G.stats.reputation - 700) / 5;
    if(Math.random()*100 < chance) {
      G.monthBroadcastScheduled = true;
      showBroadcastOffer();
      return; // 이후 흐름은 afterBroadcastDecision에서 처리
    }
  }

  // 정치 이벤트 체크 (1월, 조건 충족 시)
  ensureRomance(); // 하위호환
  if (G.month === 1 && G.status !== 'associate' && G.stats.reputation >= 700 && G.hoemu_count >= 10 && !G.politicsAccepted && !G.isCityCouncil) {
    const gameYear = G.year;
    const actualYear = 2029 + gameYear;
    if ((gameYear === 5 || gameYear === 9)) {
      showPoliticsEvent(actualYear);
      return;
    }
  }

  // 더블랙 첫달 이벤트
  if (G.isBlackFirmFirstMonth) {
    G.isBlackFirmFirstMonth = false;
    showBlackFirmEvent();
    return;
  }

  // 스카웃 제의 (매월)
  checkScoutOffer();

  // 1월 이벤트
  if (G.month === 1) {
    processInvestmentsYearly();
    if (G.status === 'inhouse') G.salary += 500000;
    checkJanuaryEvents();
  }
}

// ==================== STATUS SYSTEM ====================
function getWinRate() {
  return (G.wins+G.losses)>0 ? Math.round(G.wins/(G.wins+G.losses)*100) : 0;
}

function checkJanuaryEvents() {
  const wr = getWinRate();
  const statusYears = Math.floor(G.statusMonths / 12);

  // 승진 체크 (우선순위: 대표 > 파트너)
  if (G.status === 'partner' && statusYears >= 3 && G.stats.reputation >= 700 && wr >= 70) {
    showStatusEvent('senior'); return;
  }
  if (G.status === 'associate' && statusYears >= 2 && G.stats.reputation >= 300 && wr >= 60) {
    showStatusEvent('partner'); return;
  }

  // 월급상승 체크
  checkSalaryRaise();
}

function checkSalaryRaise() {
  const wr = getWinRate();
  const score = (wr/10) + (G.lastYearCases/30) + (G.stats.lawKnowledge/100) + (G.stats.sales/100) + (G.stats.charm/100);

  if (G.status === 'associate' && score > 25) {
    showSalaryRaiseEvent(500000);
  } else if (G.status === 'partner' && score > 35) {
    showSalaryRaiseEvent(1000000);
  }
}

  document.getElementById('se-dialog').classList.remove('no-face');

  const amountMan = amount / 10000;
  document.getElementById('se-text').textContent =

    G.isLecturer = false;
    G._scheduleBuiltFor = null;
    showToast('강사계약이 해지되었습니다.');
  });
}

function openChangeMenu() {
  document.getElementById('storage-modal').style.display = 'flex';
  document.getElementById('storage-title').textContent = '신상관리';
  let html = '';

  // 피임 토글 (결혼 상태일 때)
  ensureRomance();
  if (G.isMarried) {
    const contraLabel = G.contraception ? '피임 해제' : '피임 설정';
    html += `<div class="action-option" onclick="G.contraception=!G.contraception;showToast(G.contraception?'피임을 시작합니다.':'피임을 해제합니다.');openChangeMenu()">
      <div><div class="name" style="color:#88aacc">${contraLabel}</div>
      <div class="effects">${G.contraception?'현재 피임 중입니다':'현재 피임을 하지 않고 있습니다'}</div></div></div>`;
  }

  // 사직 (어쏘/파트너/대표/사내변호사)
  if (G.status === 'associate' || G.status === 'partner' || G.status === 'senior' || isInhouse()) {
    html += `<div class="action-option" onclick="document.getElementById('storage-modal').style.display='none';confirmResign()">
      <div><div class="name" style="color:#cc6666">사직</div>
      <div class="effects">현재 직장을 그만두고 개업 또는 휴업</div></div></div>`;
  }

  // 강의중단 (강사일 때)
  if (G.isLecturer) {
    html += `<div class="action-option" onclick="document.getElementById('storage-modal').style.display='none';confirmQuitLecturer()">
      <div><div class="name" style="color:#cc6666">강의중단</div>
      <div class="effects">법학강의를 그만둡니다</div></div></div>`;
  }

  // 폐업 (개업변호사)
  if (G.status === 'solo') {
    html += `<div class="action-option" onclick="confirmCloseOffice()">
      <div><div class="name" style="color:#cc6666">폐업</div>
      <div class="effects">사무소를 폐업하고 휴업변호사로 전환</div></div></div>`;
  }

  // 이별 (연인이 있고 결혼하지 않았을 때)
  ensureRomance();
  if (G.romance.dating && !G.isMarried) {
    const datingTarget = getRomanceTargets().find(t=>t.id===G.romance.dating);
    const datingName = datingTarget ? datingTarget.name : '연인';
    html += `<div class="action-option" onclick="document.getElementById('storage-modal').style.display='none';confirmBreakup()">
      <div><div class="name" style="color:#cc6666">이별</div>
      <div class="effects">${datingName}와(과) 헤어집니다</div></div></div>`;
  }

  // 이혼 (결혼 상태일 때만 활성화)
  if (G.isMarried && G.romance.dating) {
    const divorceTarget = getRomanceTargets().find(t=>t.id===G.romance.dating);
    const divorceName = divorceTarget ? divorceTarget.name : '배우자';
    html += `<div class="action-option" onclick="document.getElementById('storage-modal').style.display='none';confirmDivorce()">
      <div><div class="name" style="color:#cc6666">이혼</div>
      <div class="effects">${divorceName}와(과) 이혼합니다</div></div></div>`;
  } else {
    html += `<div class="action-option" style="opacity:0.4;cursor:default">
      <div><div class="name" style="color:#888">이혼</div>
      <div class="effects">${G.isMarried ? '' : '결혼하지 않은 상태입니다'}</div></div></div>`;
  }

  document.getElementById('storage-list').innerHTML = html;
}

function confirmCloseOffice() {

  G.status = 'suspended'; G.salary = 0; G.caseFeeRate = 0; G.successFeeRate = 0;
  G.fixedExpense = 3000000; G.statusMonths = 0;
  G.cases = 0; G.preparation = 0; G.caseCards = [];
  G.officeName = ''; G.officeType = 'none';
  G.hiredAssocs = []; G.hiredStaff = [];
    updateUI();
    showToast('사무소를 폐업하였습니다. 휴업변호사로 전환되었습니다.');

function confirmBreakup() {
  ensureRomance();
  const datingId = G.romance.dating;
  if (!datingId) return;
  const datingTarget = getRomanceTargets().find(t=>t.id===datingId);
  const datingName = datingTarget ? datingTarget.name : '연인';
  const datingFace = datingTarget ? datingTarget.face : getPlayerFace();

  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  resetModalStyle(true);
  document.getElementById('se-bg').style.backgroundImage = "url('배경/식당.webp')";
  document.getElementById('se-face').style.display = 'block';
  document.getElementById('se-face-img').src = datingFace;
  document.getElementById('se-dialog').classList.remove('no-face');
  document.getElementById('se-speaker').textContent = datingName;
  document.getElementById('se-text').textContent = `${G.name}, 진심이야? 정말 나랑 헤어질거야?`;
  document.getElementById('se-choices').innerHTML = `
    <button class="event-choice" onclick="executeBreakup('${datingId}','${datingName}')">헤어진다</button>
    <button class="event-choice" onclick="cancelBreakup('${datingId}')">헤어지지 않는다</button>`;
}
function cancelBreakup(datingId) {
  document.getElementById('status-event-modal').style.display='none';
  ensureRomance();
  G.romance.affection[datingId] = Math.max(0, (G.romance.affection[datingId]||0) - 20);
  showToast('호감도가 감소했습니다.');
}

function executeBreakup(id, name) {
  const datingTarget = getRomanceTargets().find(t=>t.id===id);
  const datingFace = datingTarget ? datingTarget.face : getPlayerFace();
  const datingName = datingTarget ? datingTarget.name : name;
  G.romance.dating = null;
  if (!G.brokenUp) G.brokenUp = {};
  G.brokenUp[id] = true;
  document.getElementById('se-speaker').textContent = datingName;
  document.getElementById('se-text').textContent = '알겠어, 앞으로의 행복을 빌게';
  document.getElementById('se-choices').innerHTML = `
    <button class="event-choice" onclick="document.getElementById('status-event-modal').style.display='none';updateUI()"><span class="choice-label">확인</span></button>`;
}

function confirmDivorce() {
  ensureRomance();
  const datingId = G.romance.dating;
  if (!datingId || !G.isMarried) return;
  const datingTarget = getRomanceTargets().find(t=>t.id===datingId);
  const datingName = datingTarget ? datingTarget.name : '배우자';
  const datingFace = datingTarget ? datingTarget.face : getPlayerFace();

  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  document.getElementById('se-bg').style.backgroundImage = "url('배경/저녁외출.webp')";
  document.getElementById('se-face').style.display = 'block';
  document.getElementById('se-face-img').src = datingFace;
  document.getElementById('se-dialog').classList.remove('no-face');
  document.getElementById('se-speaker').textContent = datingName;
  document.getElementById('se-text').textContent = '정말 나랑 이혼하고 싶은 거냐';
  document.getElementById('se-choices').innerHTML = `
    <button class="event-choice" onclick="executeDivorce('${datingId}','${datingName}')">이혼한다</button>
    <button class="event-choice" onclick="cancelDivorce('${datingId}')">다시 생각해볼게, 이혼하지 않는다</button>`;
}

function executeDivorce(id, name) {
  G.isMarried = false;
  G.romance.dating = null;
  if (!G.brokenUp) G.brokenUp = {};
  G.brokenUp[id] = true;
  G.fixedExpense = calcFixedExpense();
  document.getElementById('se-speaker').textContent = '';
  document.getElementById('se-face').style.display = 'none';
  document.getElementById('se-dialog').classList.add('no-face');
  document.getElementById('se-text').textContent = `${G.name}변호사와 ${name}은 이혼하였습니다.`;
  document.getElementById('se-choices').innerHTML = `
    <button class="event-choice" onclick="document.getElementById('status-event-modal').style.display='none';updateUI()"><span class="choice-label">확인</span></button>`;
}

function cancelDivorce(datingId) {
  document.getElementById('status-event-modal').style.display = 'none';
  ensureRomance();
  G.romance.affection[datingId] = Math.max(0, (G.romance.affection[datingId]||0) - 30);
  showToast('호감도가 크게 감소했습니다.');
}

function confirmResign() {
  document.getElementById('menu-modal').style.display = 'none';
  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  document.getElementById('se-bg').style.backgroundImage = "url('배경/상담.webp')";
  document.getElementById('se-face').style.display = 'none';
  document.getElementById('se-dialog').classList.add('no-face');
  document.getElementById('se-speaker').textContent = '';
  document.getElementById('se-text').textContent = '사직 후 무엇을 하시겠습니까?';

    <button class="event-choice" onclick="resignAndSolo()"><span class="choice-label">개업</span> 법률사무소를 차린다</button>
    <button class="event-choice" onclick="resignAndSuspend()"><span class="choice-label">휴업</span> 잠시 쉰다</button>

}

function resignAndSolo() {
  document.getElementById('status-event-modal').style.display = 'none';
  G.status = 'solo'; G.salary = 0; G.caseFeeRate = 1; G.successFeeRate = 1;
  G.statusMonths = 0; G.firmId = 'solo'; G.firmName = '';

function showOfficeSelection() {
  const modal = document.getElementById('storage-modal');
  modal.style.display = 'flex';
  document.getElementById('storage-title').textContent = '사무실을 선택하세요';
  let html = '';
  OFFICE_TYPES.forEach(o => {
    html += `<div class="action-option" onclick="selectOfficeForSolo('${o.id}')">

  });
  document.getElementById('storage-list').innerHTML = html;
}

function selectOfficeForSolo(officeId) {
  G.officeType = officeId;
  G.fixedExpense = calcFixedExpense();
  document.getElementById('storage-modal').style.display = 'none';
  document.getElementById('office-name-modal').style.display = 'flex';
  document.getElementById('office-name-input').focus();
}

function confirmOfficeName() {
  const name = document.getElementById('office-name-input').value.trim();
  if (!name) { document.getElementById('office-name-input').focus(); return; }
  G.officeName = name;
  document.getElementById('office-name-modal').style.display = 'none';
  updateUI();
}

function resignAndSuspend() {
  document.getElementById('status-event-modal').style.display = 'none';
  G.status = 'suspended'; G.salary = 0; G.caseFeeRate = 0; G.successFeeRate = 0;
  G.fixedExpense = 3000000; G.statusMonths = 0;
  G.cases = 0; G.preparation = 0; G.caseCards = []; // 진행중 사건 모두 소멸
  updateUI();
}

function openComputer() {
  const modal = document.getElementById('computer-modal');
  modal.style.display = 'flex';

}

function renderComputer() {
  let html = '';
  // 팔로워/구독자 표시
  if (G.snsStarted || G.youtubeStarted) {
    html += '<div style="text-align:center;margin-bottom:12px;padding:8px;background:#1a1810;border-radius:6px;font-size:0.8rem;color:#a09080">';
    if (G.snsStarted) html += `SNS 팔로워: <span style="color:#66cc88;font-weight:700">${G.snsFollowers.toLocaleString()}</span> `;
    if (G.youtubeStarted) html += `유튜브 구독자: <span style="color:#cc6666;font-weight:700">${G.youtubeSubscribers.toLocaleString()}</span>`;
    html += '</div>';
  }

  const jDone = G.monthApplied;
  html += `<div class="action-option" onclick="${jDone?'':`openJobSearch()`}" style="${jDone?'opacity:0.4;cursor:default':''}">
    <div><div class="name">구직활동</div><div class="effects">${jDone?'이번 달 이미 지원함':'로펌/회사에 지원 (매월 1곳)'}</div></div></div>`;
  const canHire = G.status==='partner'||G.status==='senior'||G.status==='solo';
  html += `<div class="action-option" onclick="${canHire?'openHireMenu()':'showToast(\'파트너/대표/개업 변호사만 이용 가능합니다.\')'}" style="${canHire?'':'opacity:0.5'}">

function confirmMarketing(type) {
  const label = type==='sns' ? 'SNS' : '유튜브';
  const cost = type==='sns' ? '20만원' : '50만원';
  let html = `<div class="modal-title">${label} 영업</div>`;
  html += `<div style="text-align:center;color:#e8d5b5;font-size:0.9rem;line-height:1.7;margin-bottom:16px">${label}를 이용해서 영업을 할까요?<br>비용은 ${cost}이 듭니다.</div>`;
  html += `<div style="display:flex;gap:8px;justify-content:center">
    <button class="btn btn-primary" style="padding:8px 30px" onclick="doMarketing('${type}')">네</button>
    <button class="btn btn-secondary" style="padding:8px 30px" onclick="openMarketingMenu()">아니오</button></div>`;
  document.getElementById('computer-list').innerHTML = html;
}

function doMarketing(type) {
  if (type === 'sns') {
    if (G.funds < 200000) { showToast('자금이 부족합니다.'); return; }
    G.funds -= 200000;
    const bonus = G.stats.debate/400 + G.stats.lawKnowledge/400 - G.stats.karma/100;
    G.stats.sales = Math.min(999, G.stats.sales + 1 + bonus);
    G.stats.reputation = Math.min(999, G.stats.reputation + 1 + bonus);
    G.snsStarted = true;
    showToast('SNS 영업 완료!');
  } else {
    if (G.funds < 500000) { showToast('자금이 부족합니다.'); return; }
    G.funds -= 500000;
    const bonus1 = G.stats.charm/150 + G.stats.debate/400 - G.stats.karma/50;
    G.stats.sales = Math.min(999, G.stats.sales + bonus1);
    G.stats.reputation = Math.min(999, G.stats.reputation + bonus1);
    // 유튜브 영업 시 구독자 증가
    const subGain = Math.floor(G.stats.charm*10 + G.stats.debate*5 + G.stats.reputation*5);
    G.youtubeSubscribers += subGain;
    G.youtubeStarted = true;
    showToast(`유튜브 영업 완료! 구독자 +${subGain.toLocaleString()}명`);
  }
  G.monthMarketingDone = true;
  updateUI(); renderComputer();
}

function openShopping() {
  let html = '<div class="modal-title">쇼핑</div>';
  const categories = [
    {key:'etc',label:'기타'},
    {key:'book',label:'책 (책장)'},
    {key:'drink',label:'음료 (냉장고)'},
    {key:'clothes',label:'옷/가방 (옷장)'},
  ];
  categories.forEach(cat => {
    const items = SHOP_ITEMS.filter(i => {
      if (i.category !== cat.key) return false;
      if (i.gender && i.gender !== G.gender) return false;
      return true;
    });
    if (!items.length) return;
    html += `<div class="action-category"><div class="action-category-title">${cat.label}</div>`;
    items.forEach(item => {
      const owned = getItemCount(item.id);
      const full = owned >= item.max;
      const priceStr = item.price > 0 ? `${(item.price/10000)}만원` : '무료';
      html += `<div class="action-option" onclick="${full?'':`buyItem('${item.id}')`}" style="${full?'opacity:0.4;cursor:default':''}">
        <span style="font-size:1.5rem;margin-right:8px">${item.icon||''}</span>
        <div style="flex:1"><div class="name">${item.name} ${full?'(보유중)':owned>0?`(${owned}/${item.max})`:''}</div>
        <div class="effects">${item.desc}</div></div>
        <div class="cost">${priceStr}</div></div>`;
    });
    html += '</div>';
  });
  // 차 카테고리
  const carItems = SHOP_ITEMS.filter(i=>i.category==='car');
  if (carItems.length) {
    const curCarLabel = G.currentCar ? (SHOP_ITEMS.find(i=>i.id===G.currentCar)?.name || '없음') : '없음';
    html += `<div class="action-category"><div class="action-category-title">차 (현재: ${curCarLabel})</div>`;
    carItems.forEach(item => {
      const isCurrent = G.currentCar === item.id;
      const priceStr = `${(item.price/10000).toLocaleString()}만원`;
      html += `<div class="action-option" onclick="${isCurrent?'':`buyItem('${item.id}')`}" style="${isCurrent?'opacity:0.4;cursor:default':''}">
        <span style="font-size:1.5rem;margin-right:8px">${item.icon||''}</span>
        <div style="flex:1"><div class="name">${item.name} ${isCurrent?'(보유중)':''}</div>
        <div class="effects">${item.desc}</div></div>
        <div class="cost">${priceStr}</div></div>`;
    });
    html += '</div>';
  }
  html += `<div class="action-option" onclick="renderComputer()"><div><div class="name" style="color:#888">뒤로</div></div></div>`;
  document.getElementById('computer-list').innerHTML = html;
}

function buyItem(itemId) {
  const item = SHOP_ITEMS.find(i=>i.id===itemId);
  if (!item) return;
  // 차량은 별도 처리
  if (item.category === 'car') { buyCar(itemId); return; }
  const owned = getItemCount(itemId);
  if (owned >= item.max) { showToast('이미 최대 보유량입니다.'); return; }
  if (G.funds < item.price) { showToast('자금이 부족합니다.'); return; }
  G.funds -= item.price;
  G.inventory[itemId] = (G.inventory[itemId]||0) + 1;
  // 즉시 효과 (책, 컴퓨터 - 옷/가방은 착용 시 적용)
  const isWearable = (item.category==='clothes' && ['premiumSuit','luxurySuit','premiumDress','luxuryDress'].includes(item.id));
  if (item.effects && !isWearable) {
    for (const k in item.effects) {
      if (G.stats[k] !== undefined) G.stats[k] = Math.min(999, G.stats[k] + item.effects[k]);
    }
  }
  if (item.proEffect) {
    for (const k in item.proEffect) {
      if (G.proStats[k] !== undefined) G.proStats[k] = Math.min(100, G.proStats[k] + item.proEffect[k]);
    }
  }
  if (item.statEffects) {
    for (const k in item.statEffects) {
      if (G.stats[k] !== undefined) G.stats[k] = Math.min(999, G.stats[k] + item.statEffects[k]);
    }
  }
  // 전문서적: 랜덤 전문능력치 +2
  if (item.isProBook) {
    const proKeys = Object.keys(PRO_NAMES);
    const rk = proKeys[Math.floor(Math.random()*proKeys.length)];
    G.proStats[rk] = Math.min(100, (G.proStats[rk]||0) + 2);
    showToast(`${item.name} 구매 완료! ${PRO_NAMES[rk]} +2`);
  } else {
    showToast(`${item.name} 구매 완료!`);
  }
  updateUI(); openShopping();
}

function buyCar(carId) {
  const item = SHOP_ITEMS.find(i=>i.id===carId);
  if (!item) return;
  if (G.currentCar === carId) { showToast('이미 보유 중인 차량입니다.'); return; }
  if (G.funds < item.price) { showToast('자금이 부족합니다.'); return; }
  G.funds -= item.price;
  // 이전 차 보너스 제거
  if (G.currentCar) {
    const oldCar = SHOP_ITEMS.find(i=>i.id===G.currentCar);
    if (oldCar && oldCar.carBonus) {
      G.stats.sales = Math.max(0, G.stats.sales - oldCar.carBonus);
    }
  }
  // 새 차 보너스 적용
  G.currentCar = carId;
  G.stats.sales = Math.min(999, G.stats.sales + item.carBonus);
  showToast(`${item.name} 구매 완료! 영업력 +${item.carBonus}`);
  updateUI(); openShopping();
}

function openFridge() {
  const drinks = SHOP_ITEMS.filter(i=>i.category==='drink'&&getItemCount(i.id)>0);
  if (!drinks.length) { showToast('냉장고에 아무것도 없습니다.'); return; }
  document.getElementById('storage-modal').style.display = 'flex';
  document.getElementById('storage-title').textContent = '냉장고';
  let html = '';
  drinks.forEach(item => {
    const cnt = getItemCount(item.id);
    const effStr = Object.entries(item.useEffects).map(([k,v])=>`${STAT_NAMES[k]||k} ${v>0?'+':''}${v}`).join(', ');
    html += `<div class="action-option" onclick="useDrink('${item.id}')">
      <span style="font-size:1.5rem;margin-right:8px">${item.icon}</span>
      <div style="flex:1"><div class="name">${item.name} (${cnt}개)</div>

      <div class="effects" style="color:#66cc88">효과: ${effStr}</div></div>
      <div class="cost">사용</div></div>`;
  });
  document.getElementById('storage-list').innerHTML = html;
}

function useDrink(itemId) {
  const item = SHOP_ITEMS.find(i=>i.id===itemId);
  if (!item || getItemCount(itemId) <= 0) return;
  G.inventory[itemId]--;
  for (const k in item.useEffects) {
    if (G.stats[k] !== undefined) G.stats[k] = Math.max(0, Math.min(999, G.stats[k] + item.useEffects[k]));
  }
  showToast(`${item.name} 사용!`);
  updateUI();
  const remaining = SHOP_ITEMS.filter(i=>i.category==='drink'&&getItemCount(i.id)>0);
  if (remaining.length) openFridge();
  else document.getElementById('storage-modal').style.display = 'none';
}

  }

  // 갈아입을 수 있는 옷 (보유 중 + 현재 안 입고 있는 것)
  owned.forEach(item => {
    const isWearing = G.currentOutfit === item.id;
    const canWear = wearableIds.includes(item.id);
    const effStr = item.effects ? Object.entries(item.effects).map(([k,v])=>`${STAT_NAMES[k]||k} +${v}`).join(', ') : '';

    if (canWear && !isWearing) {
      html += `<div class="action-option" onclick="confirmEquip('${item.id}')">

        <div class="effects">${item.desc}</div>
        <div class="effects" style="color:#66cc88">착용 효과: ${effStr}</div></div></div>`;

      // 가방 등 비착용 아이템
      html += `<div class="action-option" style="cursor:default">

        <div class="effects">${item.desc}</div>
        <div class="effects" style="color:#66cc88">효과: ${effStr}</div></div></div>`;

function openJobSearch() {
  // 현재 소속 제외, 랜덤 5곳 (로펌+회사 섞어서)
  let pool = [];
  LAW_FIRMS.filter(f=>f.id!==G.firmId).forEach(f=>{
    const recruiting = Math.random()<0.5 ? 'assoc' : 'partner';
    pool.push({type:'firm',data:f,recruiting});
  });
  COMPANIES.filter(c=>c.id!==G.firmId).forEach(c=>{
    pool.push({type:'company',data:c,recruiting:'inhouse'});
  });
  // 랜덤 5곳
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const listings = pool.slice(0,5);

  let html = '<div class="modal-title">구직 - 채용공고</div>';
  html += `<div style="font-size:0.75rem;color:#a09080;text-align:center;margin-bottom:10px">현재 소속: ${G.firmName}</div>`;
  listings.forEach((item,idx) => {
    if (item.type === 'firm') {
      const f = item.data;
      const pos = item.recruiting === 'assoc' ? '어쏘변호사' : '파트너변호사';
      const sal = item.recruiting === 'assoc' ? f.assocSalary : f.partnerSalary;
      const salStr = sal > 0 ? `${(sal/10000).toLocaleString()}만원` : '없음';
      const displaySal = (f.id==='black' && item.recruiting==='assoc') ? `${(f.fakeAssocSalary/10000).toLocaleString()}만원` : salStr;
      const feeInfo = item.recruiting==='partner' ? ` + 수임료/성공보수 ${f.partnerFeeRate*100}%` : '';
      html += `<div class="action-option" onclick="applyToJob(${idx},'${item.type}','${item.recruiting}','${f.id}')">
        <div><div class="name">${f.name} <span style="color:#c9a84c;font-size:0.75rem">[${pos}]</span></div>
        <div class="effects">${f.desc} | 월급 ${displaySal}${feeInfo} | 수임료 x${f.feeMult}</div></div></div>`;
    } else {
      const c = item.data;
      html += `<div class="action-option" onclick="applyToJob(${idx},'${item.type}','inhouse','${c.id}')">
        <div><div class="name">${c.name} <span style="color:#66cc88;font-size:0.75rem">[사내변호사]</span></div>
        <div class="effects">${c.desc} | 월급 ${(c.salary/10000).toLocaleString()}만원</div></div></div>`;
    }
  });
  html += `<div class="action-option" onclick="renderComputer()"><div><div class="name" style="color:#888">뒤로</div></div></div>`;

  window._jobListings = listings;
  document.getElementById('computer-list').innerHTML = html;
}

function applyToJob(idx, type, recruiting, targetId) {
  const item = window._jobListings[idx];
  if (!item) return;
  G.monthApplied = true;

  // 서류심사
  let req;
  if (type === 'firm') {
    req = recruiting === 'assoc' ? item.data.assocReq : item.data.partnerReq;
  } else {
    req = item.data.req;
  }

  if (!checkDocScreening(req)) {
    let html = '<div class="modal-title">서류 탈락</div>';
    html += `<div style="text-align:center;color:#cc6666;font-size:0.9rem;margin-bottom:16px">서류심사에서 탈락했습니다.<br>자격 요건을 확인해보세요.</div>`;
    html += `<button class="btn btn-secondary" style="display:block;margin:0 auto" onclick="renderComputer()">확인</button>`;
    document.getElementById('computer-list').innerHTML = html;
    return;
  }

  // 서류 통과 → 면접 (퀴즈)
  const quiz = getRandomQuiz();
  let html = '<div class="modal-title">면접 - 법률문제</div>';
  html += `<div style="text-align:center;color:#e8d5b5;font-size:0.9rem;line-height:1.7;margin-bottom:16px">${quiz.q}</div>`;
  quiz.a.forEach((ans,i) => {
    html += `<div class="action-option" onclick="submitQuizAnswer(${i},${quiz.correct},'${type}','${recruiting}','${targetId}')">
      <div><div class="name">${i+1}. ${ans}</div></div></div>`;
  });
  document.getElementById('computer-list').innerHTML = html;
}

function submitQuizAnswer(selected, correct, type, recruiting, targetId) {
  if (selected !== correct) {
    let html = '<div class="modal-title">면접 탈락</div>';
    html += `<div style="text-align:center;color:#cc6666;font-size:0.9rem;margin-bottom:16px">면접에서 탈락했습니다.<br>다음 달에 다시 도전해보세요.</div>`;
    html += `<button class="btn btn-secondary" style="display:block;margin:0 auto" onclick="renderComputer()">확인</button>`;
    document.getElementById('computer-list').innerHTML = html;
    return;
  }

  // 합격!
  let data;
  if (type === 'firm') data = LAW_FIRMS.find(f=>f.id===targetId);
  else data = COMPANIES.find(c=>c.id===targetId);

  let html = '<div class="modal-title">합격!</div>';
  html += `<div style="text-align:center;color:#66cc88;font-size:0.9rem;line-height:1.7;margin-bottom:16px">${data.name}에 합격했습니다!<br>이직하시겠습니까?</div>`;
  html += `<div style="display:flex;gap:8px;justify-content:center">
    <button class="btn btn-primary" style="padding:8px 30px" onclick="acceptJob('${type}','${recruiting}','${targetId}')">이직한다</button>
    <button class="btn btn-secondary" style="padding:8px 30px" onclick="renderComputer()">거절한다</button></div>`;
  document.getElementById('computer-list').innerHTML = html;
}

function acceptJob(type, recruiting, targetId) {
  let data;
  if (type === 'firm') {
    data = LAW_FIRMS.find(f=>f.id===targetId);
    const jobType = recruiting === 'assoc' ? 'firm_assoc' : 'firm_partner';
    applyJobChange(jobType, data);
  } else {
    data = COMPANIES.find(c=>c.id===targetId);
    applyJobChange('company', data);
  }
  showToast(`${data.name}(으)로 이직했습니다!`);
  document.getElementById('computer-modal').style.display = 'none';
  updateUI();
}

function getCharImg() {
  const map = G.gender === 'male' ? OUTFIT_GRAPHICS.male : OUTFIT_GRAPHICS.female;
  return map[G.currentOutfit] || map['default'];
}

  const img = getCharImg();
  document.getElementById('room-char-img').src = img;
}

function equipOutfit(itemId) {
  // 현재 입고 있는 옷의 효과 제거 (default가 아닌 경우)
  if (G.currentOutfit !== 'default') {
    const curItem = SHOP_ITEMS.find(i=>i.id===G.currentOutfit);
    if (curItem && curItem.effects) {
      for (const k in curItem.effects) {
        if (G.stats[k] !== undefined) G.stats[k] = Math.max(0, G.stats[k] - curItem.effects[k]);
      }
    }
  }

  // 새 옷 착용
  if (itemId === 'default') {
    G.currentOutfit = 'default';
  } else {
    const item = SHOP_ITEMS.find(i=>i.id===itemId);
    if (!item) return;
    G.currentOutfit = itemId;
    // 새 옷 효과 적용
    if (item.effects) {
      for (const k in item.effects) {
        if (G.stats[k] !== undefined) G.stats[k] = Math.min(999, G.stats[k] + item.effects[k]);
      }
    }
  }

  updateCharGraphic();
  updateUI();
  showToast(itemId === 'default' ? '일반 복장으로 갈아입었습니다.' : `${item.name}(으)로 갈아입었습니다!`);
  openCloset();
}

      ${canSell?`<div class="cost" style="color:#cc6666;cursor:pointer" onclick="sellRealEstate(${i})">매도</div>`:''}
    </div>`;
  });
  html+=`<div class="action-option" onclick="openRealEstateMenu()"><div><div class="name">🏠 부동산 매입</div><div class="effects">빌라/구축/재건축/신축 아파트</div></div></div>`;

  document.getElementById('storage-list').innerHTML=html;
}

function f(v){return Math.floor(v).toLocaleString()+'원';}
function pct(cur,orig){const p=((cur-orig)/orig*100).toFixed(1);return (p>=0?'+':'')+p+'%';}
function rr(min,max){return min+Math.random()*(max-min);}

function investInput(type){
  let title,minV,maxV,unit='원';
  if(type==='savings'){title='적금 - 월 납입액 입력';minV=300000;maxV=10000000;}
  else{title={deposit:'예금',fund:'펀드',coin:'코인',domesticStock:'국내주식',foreignStock:'해외주식',commodity:'현물',venture:'벤처캐피탈',ip:'지식재산권'}[type]+' - 투자금액 입력';minV=10000000;maxV=1000000000;}
  let html=`<div class="modal-title">${title}</div>
    <div style="text-align:center;font-size:0.78rem;color:#a09080;margin-bottom:10px">최소 ${f(minV)} ~ 최대 ${f(maxV)}</div>
    <input type="number" id="invest-amount" class="name-input" style="width:100%;margin-bottom:12px;letter-spacing:1px" min="${minV}" max="${maxV}" step="1000000" value="${minV}">
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" style="padding:8px 24px" onclick="confirmInvest('${type}')">확인</button>
      <button class="btn btn-secondary" style="padding:8px 24px" onclick="openInvestMenu()">취소</button></div>`;
  document.getElementById('storage-list').innerHTML=html;
}

function confirmInvest(type){
  const amt=parseInt(document.getElementById('invest-amount').value);
  let minV=type==='savings'?300000:10000000;
  let maxV=type==='savings'?10000000:1000000000;
  if(!amt||amt<minV||amt>maxV){showToast(`${f(minV)}~${f(maxV)} 사이로 입력하세요.`);return;}
  if(type!=='savings'&&G.funds<amt){showToast('자금이 부족합니다.');return;}
  if(type==='savings'&&G.funds<amt){showToast('첫 달 납입금이 부족합니다.');return;}

  const iv=G.invest;
  if(type==='deposit'){G.funds-=amt;iv.deposit={amount:amt,monthsLeft:12};}
  else if(type==='savings'){G.funds-=amt;iv.savings={monthly:amt,totalPaid:amt,monthsLeft:12};}
  else if(type==='fund'){G.funds-=amt;iv.fund={amount:amt,monthsLeft:12};}
  else if(type==='coin'){G.funds-=amt;iv.coins.push({amount:amt,currentValue:amt});}
  else if(type==='domesticStock'){G.funds-=amt;iv.domesticStock={amount:amt,currentValue:amt};}
  else if(type==='foreignStock'){G.funds-=amt;iv.foreignStock={amount:amt,currentValue:amt};}
  else if(type==='commodity'){G.funds-=amt;iv.commodity={amount:amt,currentValue:amt};}
  else if(type==='venture'){G.funds-=amt;iv.venture={amount:amt,monthsLeft:12};}
  else if(type==='ip'){G.funds-=amt;iv.ip={amount:amt};}

  showToast('투자 완료!');updateUI();openInvestMenu();
}

function matureDeposit(){const d=G.invest.deposit;G.funds+=Math.floor(d.amount*1.035);G.invest.deposit=null;showToast('예금 만기해지!');updateUI();openInvestMenu();}
function matureSavings(){const s=G.invest.savings;G.funds+=Math.floor(s.totalPaid*1.025);G.invest.savings=null;showToast('적금 만기해지!');updateUI();openInvestMenu();}
function matureFund(){const d=G.invest.fund;const rate=rr(-0.1,0.2);G.funds+=Math.floor(d.amount*(1+rate));G.invest.fund=null;showToast(`펀드 만기해지! (${(rate*100).toFixed(1)}%)`);updateUI();openInvestMenu();}
function matureVenture(){const v=G.invest.venture;const rate=rr(-0.9,3.0);G.funds+=Math.max(0,Math.floor(v.amount*(1+rate)));G.invest.venture=null;showToast(`벤처 투자회수! (${(rate*100).toFixed(1)}%)`);updateUI();openInvestMenu();}

// 매월 투자 처리
function processInvestmentsMonthly(){
  const iv=G.invest;
  // 예금/적금/펀드/벤처 만기 카운트다운
  if(iv.deposit)iv.deposit.monthsLeft--;
  if(iv.savings){iv.savings.monthsLeft--;if(iv.savings.monthsLeft>0){G.funds-=iv.savings.monthly;iv.savings.totalPaid+=iv.savings.monthly;}}
  if(iv.fund)iv.fund.monthsLeft--;
  if(iv.venture)iv.venture.monthsLeft--;
  // 코인 변동
  iv.coins.forEach(c=>{c.currentValue=Math.max(0,Math.floor(c.currentValue*(1+rr(-0.8,2.0))));});
  // 주식 변동
  if(iv.domesticStock)iv.domesticStock.currentValue=Math.max(0,Math.floor(iv.domesticStock.currentValue*(1+rr(-0.3,0.5))));
  if(iv.foreignStock)iv.foreignStock.currentValue=Math.max(0,Math.floor(iv.foreignStock.currentValue*(1+rr(-0.15,0.3))));
  // 현물 변동
  if(iv.commodity)iv.commodity.currentValue=Math.max(0,Math.floor(iv.commodity.currentValue*(1+rr(-0.3,0.6))));
  // 지식재산권 수익
  if(iv.ip){const income=Math.floor(iv.ip.amount*rr(0.001,0.02));G.funds+=income;}
  // 부동산 보유기간
  iv.realEstate.forEach(r=>{r.monthsOwned++;});
}

// 매년 1월 투자 처리 (부동산 시세변동+세금)
function processInvestmentsYearly(){
  G.invest.realEstate.forEach(r=>{
    r.currentValue=Math.max(0,Math.floor(r.currentValue*(1+rr(-0.05,0.25))));
    const tax=Math.floor(r.currentValue*0.05);
    G.funds-=tax;
  });
}

  html += `<div class="action-category"><div class="action-category-title">어쏘변호사 후보</div>`;
  cands.assocs.forEach((a,i) => {
    const canA = canHire && G.hiredAssocs.length < maxA;
    html += `<div class="action-option" onclick="${canA?`hireAssoc(${i})`:''}" style="${canA?'':'opacity:0.4;cursor:default'}">
      <div style="flex:1"><div class="name">${a.name}</div>

      <div class="cost">${canA?'채용':G.hiredAssocs.length>=maxA?'정원초과':'채용완료'}</div></div>`;
  });

  if (G.status !== 'partner') {
    html += `<div class="action-category"><div class="action-category-title">직원 후보</div>`;
    cands.staff.forEach((s,i) => {

    });
    html += '</div>';
  }

  html += `<div class="action-option" onclick="renderComputer()"><div><div class="name" style="color:#888">뒤로</div></div></div>`;
  document.getElementById('computer-list').innerHTML = html;
}

function fireEmployee(type, idx) {
  if (type==='assoc') {
    const a = G.hiredAssocs[idx];
    // 사건 돌려받기
    a.cases.forEach(c => { if(G.cases<60){G.caseCards.push(c);G.cases++;} });
    G.hiredAssocs.splice(idx,1);
    showToast(`${a.name} 변호사를 해고했습니다.`);
  } else {
    const s = G.hiredStaff[idx];
    G.hiredStaff.splice(idx,1);
    showToast(`${s.name} 직원을 해고했습니다.`);
  }
  updateUI(); renderStaffList();
}

function takeBackCase(assocIdx, caseIdx) {
  const a = G.hiredAssocs[assocIdx];
  if(G.cases>=60){showToast('사건이 이미 60건입니다.');return;}
  const c = a.cases.splice(caseIdx,1)[0];
  G.caseCards.push(c); G.cases++;
  showToast(`${c.id} 사건을 회수했습니다.`);
  viewAssocDetail(assocIdx);
}

function buyHousing(type) {
  const cost = type === 'apartment' ? 500000000 : 2000000000;
  const label = type === 'apartment' ? '아파트' : '최고급 아파트';
  if (G.funds < cost) { showToast('자금이 부족합니다.'); return; }
  G.funds -= cost;
  G.housing = type;

  if (type === 'apartment') {
    G.stats.reputation = Math.min(999, G.stats.reputation + 50);
    G.stats.mental = Math.min(999, G.stats.mental + 100);
    G.stats.stamina = Math.min(999, G.stats.stamina + 50);
    G.stats.stress = Math.max(0, G.stats.stress - 100);
    G.stats.fatigue = Math.max(0, G.stats.fatigue - 100);
  } else {
    G.stats.reputation = Math.min(999, G.stats.reputation + 150);
    G.stats.charm = Math.min(999, G.stats.charm + 200);
    G.stats.stamina = Math.min(999, G.stats.stamina + 100);
    G.stats.stress = Math.max(0, G.stats.stress - 200);
    G.stats.fatigue = Math.max(0, G.stats.fatigue - 200);
  }

  // 메인화면 배경 변경
  document.querySelector('.room-bg').style.backgroundImage = `url('${getRoomBg()}')`;
  showToast(`${label}(으)로 이사했습니다!`);

  document.getElementById('storage-modal').style.display = 'none';

    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin-bottom:4px;background:#2a2518;border:1px solid #3a3020;border-radius:6px">
      <div>

      </div>

function reviewCase(idx) {
  if (G.monthReviewCount >= 3) { showToast('이번 달 검토 횟수를 모두 사용했습니다.'); return; }
  const card = G.caseCards[idx];
  if (!card || card.difficulty === 'd') return;

  G.monthReviewCount++;
  const chance = G.stats.observation / 10;
  if (Math.random()*100 < chance) {
    const levels = ['a','b','c','d'];
    const names = ['A','B','C','D'];
    const curIdx = levels.indexOf(card.difficulty);
    card.difficulty = levels[curIdx+1];
    card.diffName = names[curIdx+1];
    showToast(`사건 ${card.id} 난이도 하락! → ${card.diffName}`);
  } else {
    showToast(`사건 ${card.id} 검토 실패. 난이도 변화 없음.`);
  }
  renderBriefcase();
}

  html += `<button style="width:32px;height:32px;border-radius:4px;border:1px solid #5a4a30;background:#3a3020;color:#c9a84c;font-size:1.1rem;cursor:pointer;font-weight:700" onclick="adjustBulkToss(10)">▶▶</button>`;
  html += `</div>`;

  html += `<button class="event-choice" style="padding:8px 24px;font-size:0.85rem" onclick="renderBriefcase()"><span class="choice-label">취소</span></button>`;

function adjustBulkToss(delta) {
  window._bulkTossCount = Math.max(1, Math.min(window._bulkTossMax, window._bulkTossCount + delta));
  document.getElementById('bulk-toss-count').textContent = window._bulkTossCount;
}

function executeBulkToss() {
  const count = window._bulkTossCount;
  if (!count || count <= 0) return;

  // 수용량이 있는 어쏘 목록 (인덱스와 남은 수용량)
  const assocs = G.hiredAssocs.map((a, i) => ({idx: i, name: a.name, capacity: Math.max(0, 20 - a.cases.length), assigned: 0}))
    .filter(a => a.capacity > 0);

  if (assocs.length === 0) { showToast('수용 가능한 어쏘가 없습니다.'); return; }

  let remaining = count;

  // 1차: 균등 배분
  const base = Math.floor(remaining / assocs.length);
  if (base > 0) {
    assocs.forEach(a => {
      const give = Math.min(base, a.capacity);
      a.assigned = give;
      a.capacity -= give;
      remaining -= give;
    });
  }

  // 2차: 나머지 1건씩 배분 (수용량 여유 있는 어쏘에게)
  for (let i = 0; i < assocs.length && remaining > 0; i++) {
    if (assocs[i].capacity > 0) {
      assocs[i].assigned++;
      assocs[i].capacity--;
      remaining--;
    }
  }

  // 3차: 아직 남은 건이 있으면 (1차에서 수용량 부족으로 못 채운 경우) 여유 있는 어쏘에게 계속 배분
  while (remaining > 0) {
    let distributed = false;
    for (let i = 0; i < assocs.length && remaining > 0; i++) {
      if (assocs[i].capacity > 0) {
        assocs[i].assigned++;
        assocs[i].capacity--;
        remaining--;
        distributed = true;
      }
    }
    if (!distributed) break;
  }

  // 사건 배분 실행 (서류가방 앞쪽부터)
  G.caseCards.sort((a, b) => a.order - b.order);
  const results = [];
  assocs.forEach(a => {
    if (a.assigned <= 0) return;
    const cards = G.caseCards.splice(0, a.assigned);
    cards.forEach(card => G.hiredAssocs[a.idx].cases.push(card));
    G.cases -= a.assigned;
    results.push({name: a.name, count: a.assigned});
  });

  // 결과 화면 표시
  showBulkTossResult(results);
}

function showBulkTossResult(results) {
  const total = results.reduce((s, r) => s + r.count, 0);
  const list = document.getElementById('briefcase-list');
  let html = `<div style="font-size:0.95rem;color:#c9a84c;margin-bottom:14px;text-align:center;font-weight:700">한 번에 토스 완료! (${total}건 배분)</div>`;
  html += `<div style="margin-bottom:16px">`;
  results.forEach(r => {
    html += `<div style="display:flex;justify-content:space-between;padding:5px 12px;margin-bottom:3px;background:#2a2518;border:1px solid #3a3020;border-radius:4px">
      <span style="color:#e8d5b5;font-size:0.85rem">${r.name}</span>
      <span style="color:#88cc88;font-size:0.85rem;font-weight:700">${r.count}건 배정</span>
    </div>`;
  });
  html += `</div>`;
  html += `<div style="text-align:center"><button class="event-choice" style="padding:8px 24px;font-size:0.85rem" onclick="renderBriefcase()"><span class="choice-label">확인</span></button></div>`;
  list.innerHTML = html;
}

const SAVE_KEY_PREFIX = 'lawyerSave_';
const SAVE_SLOT_COUNT = 10;

function getSaveInfo(slot) {
  const raw = localStorage.getItem(SAVE_KEY_PREFIX + slot);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}

function confirmSaveOverwrite(slot) {
  document.getElementById('saveload-modal').style.display = 'none';
  gameConfirm(`슬롯 ${slot+1}에 덮어쓰시겠습니까?`, () => { saveGame(slot); }, () => { openSaveScreen(); });
}
function confirmSaveDelete(slot, mode) {
  document.getElementById('saveload-modal').style.display = 'none';
  gameConfirm(`슬롯 ${slot+1}을 삭제하시겠습니까?`, () => { deleteSave(slot); if(mode==='save') openSaveScreen(); else openLoadScreen(); }, () => { if(mode==='save') openSaveScreen(); else openLoadScreen(); });
}
function saveGame(slot) {
  const saveData = {
    version: 1,
    savedAt: new Date().toISOString(),
    meta: {
      name: G.name,
      gender: G.gender,
      status: STATUS_NAMES[G.status] || G.status,
      year: 2029 + G.year,
      month: G.month,
      funds: G.funds,
      firmName: G.firmName || G.officeName || '',
    },
    state: JSON.parse(JSON.stringify(G)),
  };
  localStorage.setItem(SAVE_KEY_PREFIX + slot, JSON.stringify(saveData));
  showToast(`슬롯 ${slot+1}에 저장되었습니다.`);
  document.getElementById('saveload-modal').style.display = 'none';
}

function loadGame(slot) {
  const data = getSaveInfo(slot);
  if (!data || !data.state) { showToast('저장 데이터가 없습니다.'); return; }

function formatSaveDate(isoStr) {
  const d = new Date(isoStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

  let html = '';

      }
    }
  }
  document.getElementById('saveload-list').innerHTML = html;
}
