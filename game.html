<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>변호사 생존기 - Lawyer Survival Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

/* ===== Title Screen ===== */
#title-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  height: 100vh; position: relative; overflow: hidden;
  background: url('게임타이틀.webp') center center / cover no-repeat;
  padding-bottom: 60px;
}
.title-btn {
  padding: 16px 60px; font-size: 1.2rem; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
  background: rgba(20,20,40,0.8); color: #c9a84c;
  border: 2px solid #c9a84c88; border-radius: 8px; cursor: pointer; letter-spacing: 6px;
  transition: all 0.3s; z-index: 1;
  backdrop-filter: blur(4px);
}
.title-btn:hover { background: rgba(40,40,80,0.9); border-color: #c9a84c; box-shadow: 0 0 30px rgba(201,168,76,0.3); }

/* ===== Gender Selection ===== */
#gender-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 50%, #0a0a2e 100%);
}
.gender-title { font-size: 2rem; font-weight: 700; color: #c9a84c; margin-bottom: 50px; letter-spacing: 4px; }
.gender-choices { display: flex; gap: 60px; }
.gender-card {
  width: 280px; background: linear-gradient(180deg, #1a1a3e, #12122a); border: 2px solid #333366;
  border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s;
}
.gender-card:hover { border-color: #c9a84c; transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.15); }
.gender-card img { width: 220px; height: 220px; object-fit: contain; margin-bottom: 20px; }
.gender-card .label { font-size: 1.3rem; font-weight: 700; color: #e0d0a0; letter-spacing: 3px; }

/* ===== Name Input Screen ===== */
#name-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 50%, #0a0a2e 100%);
}
.name-box {
  background: linear-gradient(180deg, #1e1e42, #141430); border: 2px solid #444477;
  border-radius: 12px; padding: 40px 60px; text-align: center;
}
.name-box h2 { color: #c9a84c; font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 4px; }
.name-box .char-preview { width: 150px; height: 150px; object-fit: contain; margin-bottom: 20px; }
.name-input {
  width: 260px; padding: 12px 20px; font-size: 1.1rem; font-family: 'Noto Sans KR', sans-serif;
  background: #0a0a2e; border: 2px solid #555588; border-radius: 8px; color: #e0d0a0;
  text-align: center; letter-spacing: 4px; outline: none;
}
.name-input:focus { border-color: #c9a84c; }
.name-input::placeholder { color: #555577; letter-spacing: 2px; }
.name-confirm-btn {
  display: block; margin: 24px auto 0; padding: 12px 50px; font-size: 1rem; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #c9a84c, #a8873a); color: #1a1a2e;
  border: none; border-radius: 6px; cursor: pointer; letter-spacing: 4px; transition: all 0.2s;
}
.name-confirm-btn:hover { box-shadow: 0 4px 15px rgba(201,168,76,0.3); }

/* ===== Main Game Screen (Room View) ===== */
#game-screen {
  display: none; height: 100vh; width: 100vw; position: relative; overflow: hidden;
}
.room-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: url('원룸.webp') center center / cover no-repeat;
}
.room-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.15);
}

/* Character in room */
.room-character {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  z-index: 10; pointer-events: none;
}
.room-character img {
  height: 75vh; object-fit: contain;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
}

/* Top Info Bar */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: space-between; align-items: stretch;
  min-height: 54px;
}
.top-bar-left {
  background: rgba(30,25,20,0.88); padding: 4px 24px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 2px solid #8b7355; border-right: 2px solid #8b7355;
  border-bottom-right-radius: 12px;
}
.top-bar-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  background: rgba(30,25,20,0.88); padding: 0 32px;
  display: flex; align-items: center; gap: 24px;
  border-bottom: 2px solid #8b7355;
  border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
}
.top-bar-right {
  background: rgba(30,25,20,0.88); padding: 0 24px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 2px solid #8b7355; border-left: 2px solid #8b7355;
  border-bottom-left-radius: 12px;
}
.info-label { font-size: 0.8rem; color: #a09080; }
.info-value { font-size: 1rem; font-weight: 700; color: #e8d5b5; }
.info-value.gold { color: #f0c850; }
.info-group { display: flex; flex-direction: column; align-items: center; line-height: 1.3; }

/* Left Side Buttons */
.side-left {
  position: absolute; left: 16px; top: 120px; z-index: 20;
  display: flex; flex-direction: column; gap: 6px;
}
.side-btn {
  width: 110px; padding: 10px 0; text-align: center;
  background: rgba(30,25,20,0.85); border: 1px solid #8b7355;
  border-radius: 6px; color: #e8d5b5; font-size: 0.9rem; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: all 0.2s; letter-spacing: 2px;
}
.side-btn:hover { background: rgba(60,50,35,0.95); border-color: #c9a84c; color: #f0d68a; }

/* Right Side Buttons (Items grid) */
.side-right {
  position: absolute; right: 16px; top: 120px; z-index: 20;
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.item-btn {
  width: 80px; height: 60px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(30,25,20,0.85); border: 1px solid #8b7355;
  border-radius: 6px; color: #c0b090; font-size: 0.75rem; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.item-btn:hover { background: rgba(60,50,35,0.95); border-color: #c9a84c; }
.item-icon { font-size: 1.3rem; margin-bottom: 2px; }

/* ===== Overlay Screens (Schedule, Execution, etc.) ===== */
.overlay-screen {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 50; overflow: hidden;
  align-items: center; justify-content: center;
}
.overlay-panel {
  background: linear-gradient(180deg, #2a2518, #1e1a12);
  border: 2px solid #8b7355; border-radius: 12px;
  width: 90%; max-width: 900px; max-height: 88vh; overflow-y: auto;
  padding: 24px; position: relative;
}
.overlay-close {
  position: absolute; top: 10px; right: 16px; background: none; border: none;
  color: #a09080; font-size: 1.5rem; cursor: pointer; padding: 4px 8px; z-index: 5;
}
.overlay-close:hover { color: #e8d5b5; }
.overlay-title {
  font-size: 1.4rem; font-weight: 700; color: #c9a84c; text-align: center;
  margin-bottom: 20px; letter-spacing: 3px;
}

/* Schedule Grid */
.schedule-grid {
  display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 2px; margin-bottom: 16px;
}
.schedule-header {
  background: #3a3020; padding: 6px 2px; text-align: center;
  font-size: 0.8rem; font-weight: 700; color: #c0b090; border-radius: 4px;
}
.schedule-header.sun { color: #e06060; }
.schedule-header.sat { color: #6088e0; }
.schedule-week-label {
  background: #2a2518; padding: 6px 2px; text-align: center;
  font-size: 0.72rem; color: #8a7a60; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.schedule-cell {
  background: #2a2518; border: 1px solid #3a3020; border-radius: 4px;
  padding: 3px; min-height: 62px; cursor: default; transition: all 0.2s;
}
.schedule-cell.editable {
  cursor: pointer; border: 1px dashed #8b735588; background: #302a1e;
}
.schedule-cell.editable:hover { border-color: #c9a84c; background: #3a3225; box-shadow: 0 0 8px rgba(201,168,76,0.15); }
.schedule-cell.locked { opacity: 0.65; }
.schedule-cell .day-num { font-size: 0.68rem; color: #7a6a50; margin-bottom: 2px; }
.schedule-cell .slot { font-size: 0.62rem; padding: 2px 3px; border-radius: 2px; margin-bottom: 1px; text-align: center; }
.slot-empty { color: #c9a84c77; font-style: italic; animation: slotPulse 2s ease-in-out infinite; }
@keyframes slotPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
.slot-work { background: #2a3040; color: #80a0cc; }
.slot-study { background: #302848; color: #a080cc; }
.slot-social { background: #283828; color: #80cc90; }
.slot-rest { background: #383828; color: #cccc70; }
.slot-trial { background: #402828; color: #cc7070; }
.slot-special { background: #403820; color: #cca050; }

.schedule-actions {
  display: flex; justify-content: center; gap: 16px; padding-top: 8px;
}

.btn {
  padding: 10px 30px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.95rem; font-weight: 700;
  border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 2px;
}
.btn-primary { background: linear-gradient(135deg, #c9a84c, #a8873a); color: #1a1a1a; }
.btn-primary:hover { box-shadow: 0 4px 12px rgba(201,168,76,0.3); }
.btn-secondary { background: #3a3020; color: #c0b090; border: 1px solid #5a4a30; }
.btn-secondary:hover { background: #4a4030; }

/* Action Modal */
#action-modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
}
.modal-content {
  background: linear-gradient(180deg, #2a2518, #1e1a12); border: 2px solid #8b7355;
  border-radius: 12px; padding: 28px; max-width: 480px; width: 90%;
  max-height: 80vh; overflow-y: auto; position: relative;
}
.modal-close {
  position: absolute; top: 10px; right: 14px; background: none; border: none;
  color: #a09080; font-size: 1.5rem; cursor: pointer; padding: 4px 8px;
}
.modal-close:hover { color: #e06060; }
.modal-title { font-size: 1.1rem; font-weight: 700; color: #c9a84c; margin-bottom: 16px; text-align: center; }
.action-category { margin-bottom: 14px; }
.action-category-title {
  font-size: 0.82rem; font-weight: 700; color: #a09060; margin-bottom: 6px;
  padding-bottom: 4px; border-bottom: 1px solid #3a3020;
}
.action-option {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; margin-bottom: 3px; background: #2a2518;
  border: 1px solid #3a3020; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.action-option:hover { border-color: #c9a84c; background: #3a3225; }
.action-option .name { font-weight: 500; color: #ddd; font-size: 0.9rem; }
.action-option .cost { font-size: 0.78rem; color: #c09030; }
.action-option .effects { font-size: 0.68rem; color: #8a8a70; margin-top: 2px; }

/* Stats Panel (left overlay) */
#stats-panel {
  display: none; position: absolute; top: 0; left: 0; width: 300px; height: 100%;
  background: rgba(30,25,20,0.95); border-right: 2px solid #8b7355;
  z-index: 40; overflow-y: auto; padding: 20px;
  backdrop-filter: blur(8px);
}
#stats-panel .panel-title {
  font-size: 1.1rem; font-weight: 700; color: #c9a84c; text-align: center;
  margin-bottom: 16px; letter-spacing: 3px;
}
.stat-section-title {
  font-size: 0.72rem; font-weight: 700; color: #a09060; letter-spacing: 3px;
  margin: 12px 0 6px; padding-bottom: 3px; border-bottom: 1px solid #3a3020;
}
.stat-row { display: flex; align-items: center; padding: 2px 0; font-size: 0.8rem; }
.stat-name { color: #a09080; width: 68px; flex-shrink: 0; }
.stat-bar-wrap { flex: 1; height: 4px; background: #1a1810; border-radius: 2px; margin: 0 6px; overflow: hidden; }
.stat-bar { height: 100%; border-radius: 2px; transition: width 0.5s; }
.stat-value { color: #e8d5b5; font-weight: 700; min-width: 30px; text-align: right; font-size: 0.78rem; }
.bar-blue { background: linear-gradient(90deg, #4466aa, #6688cc); }
.bar-green { background: linear-gradient(90deg, #44aa66, #66cc88); }
.bar-red { background: linear-gradient(90deg, #aa4444, #cc6666); }
.bar-yellow { background: linear-gradient(90deg, #aa8844, #ccaa66); }
.bar-purple { background: linear-gradient(90deg, #8844aa, #aa66cc); }
.bar-cyan { background: linear-gradient(90deg, #44aaaa, #66cccc); }
.bar-orange { background: linear-gradient(90deg, #cc8833, #eebb55); }
.stats-close {
  position: absolute; top: 10px; right: 12px; background: none; border: none;
  color: #a09080; font-size: 1.3rem; cursor: pointer;
}
.stats-close:hover { color: #e8d5b5; }

/* ===== VN Popup Window (600x600) ===== */
#vn-screen {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 200; background: rgba(0,0,0,0.45);
  align-items: center; justify-content: center;
}
.vn-window {
  width: 600px; height: 600px; position: relative;
  border: 3px solid #8b7355; border-radius: 12px;
  overflow: hidden; cursor: pointer;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.vn-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  transition: background-image 0.3s;
}
.vn-bg-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.12);
}
.vn-date-badge {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(20,18,12,0.88); border: 1px solid #8b7355; border-radius: 6px;
  padding: 4px 18px; color: #c9a84c; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 2px; z-index: 5;
}
.vn-face {
  position: absolute; bottom: 0; left: 12px; z-index: 5;
  width: 130px; height: 130px; border-radius: 10px; overflow: hidden;
  border: 2px solid #8b7355; box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  background: #1a1810;
}
.vn-face img {
  width: 100%; height: 100%; object-fit: cover;
}
.vn-dialog-box {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  background: rgba(20,18,12,0.93); border-top: 2px solid #8b7355;
  padding: 14px 18px 16px 155px; height: 150px;
  backdrop-filter: blur(6px);
  overflow-y: auto;
}
.vn-dialog-box.no-face {
  padding-left: 18px;
}
.vn-speaker {
  font-size: 0.78rem; font-weight: 700; color: #c9a84c; margin-bottom: 6px;
  letter-spacing: 2px;
}
.vn-text {
  font-size: 0.92rem; color: #e8d5b5; line-height: 1.7; letter-spacing: 0.3px;
}
.vn-result-badge {
  display: inline-block; padding: 2px 10px; border-radius: 4px;
  font-size: 0.72rem; font-weight: 700; margin-bottom: 6px;
}
.vn-result-great { background: rgba(255,204,68,0.2); color: #ffcc44; border: 1px solid #ffcc4444; }
.vn-result-success { background: rgba(102,204,136,0.2); color: #66cc88; border: 1px solid #66cc8844; }
.vn-result-fail { background: rgba(204,102,102,0.2); color: #cc6666; border: 1px solid #cc666644; }
.vn-result-info { background: rgba(160,144,128,0.2); color: #a09080; border: 1px solid #a0908044; }
.vn-prompt {
  position: absolute; bottom: 6px; right: 14px; font-size: 0.65rem;
  color: #8b735588; animation: vnBlink 1.2s ease-in-out infinite;
}
@keyframes vnBlink { 0%,100%{opacity:0.3} 50%{opacity:1} }
.vn-stat-changes {
  margin-top: 6px; font-size: 0.72rem; color: #a09080;
}
.vn-stat-changes .pos { color: #66cc88; }
.vn-stat-changes .neg { color: #cc6666; }

.log-success { color: #66cc88; } .log-great { color: #ffcc44; }
.log-fail { color: #cc6666; } .log-info { color: #8a8a70; } .log-event { color: #cc88ff; }

/* Event Box */
.event-box {
  max-width: 560px; width: 100%; margin: 0 auto;
  background: linear-gradient(180deg, #2a2518, #1e1a12);
  border: 2px solid #c9a84c44; border-radius: 12px; padding: 28px;
}
.event-title { font-size: 1.2rem; font-weight: 700; color: #c9a84c; margin-bottom: 14px; text-align: center; }
.event-desc { font-size: 0.92rem; color: #c0b8a0; line-height: 1.8; margin-bottom: 20px; text-align: center; }
.event-choice {
  display: block; width: 100%; padding: 7px 14px; margin-bottom: 4px;
  background: #2a2518; border: 1px solid #3a3020; border-radius: 6px;
  color: #ddd; font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem;
  cursor: pointer; transition: all 0.2s; text-align: left;
}
.event-choice:hover { border-color: #c9a84c; background: #3a3225; }
.event-choice .choice-label { color: #c9a84c; font-weight: 700; margin-right: 6px; }

/* Month Summary */
#month-summary {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
}
.summary-content {
  background: linear-gradient(180deg, #2a2518, #1e1a12); border: 2px solid #8b7355;
  border-radius: 12px; padding: 28px; max-width: 500px; width: 90%;
  max-height: 80vh; overflow-y: auto; text-align: center;
}
.summary-title { font-size: 1.2rem; font-weight: 700; color: #c9a84c; margin-bottom: 16px; }
.summary-changes { text-align: left; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; padding: 3px 8px; font-size: 0.82rem; border-bottom: 1px solid #2a2518; }
.summary-row .sname { color: #a09080; }
.summary-row .schange { font-weight: 700; }
.spos { color: #66cc88; } .sneg { color: #cc6666; }

/* Toast Notification */
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(30,25,20,0.95); border: 2px solid #8b7355; border-radius: 10px;
  padding: 24px 40px; z-index: 200; text-align: center;
  color: #e8d5b5; font-size: 1.1rem; font-weight: 700; letter-spacing: 2px;
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }

/* Ending Screen */
#ending-screen {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 300; background: #000;
}
#ending-screen .ending-vn-window {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
#ending-screen .ending-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-size: cover; background-position: center;
  opacity: 0; transition: opacity 1.5s;
}
#ending-screen .ending-char {
  position: absolute; bottom: 0; right: 5%; height: 85%;
  opacity: 0; transition: opacity 1.5s ease 0.5s;
  z-index: 2; pointer-events: none;
}
#ending-screen .ending-dialog-box {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(20,18,12,0.92); border-top: 2px solid #8b7355;
  padding: 22px 28px 18px; z-index: 3; cursor: pointer;
  opacity: 0; transition: opacity 1s ease 1s;
}
#ending-screen .ending-dialog-title {
  font-size: 1.3rem; font-weight: 900; color: #c9a84c; margin-bottom: 6px;
}
#ending-screen .ending-dialog-grade {
  font-size: 0.85rem; color: #e0c070; margin-bottom: 8px;
}
#ending-screen .ending-dialog-text {
  font-size: 0.92rem; color: #e8d5b5; line-height: 1.9; white-space: pre-line;
}
#ending-screen .ending-prompt {
  text-align: right; font-size: 0.75rem; color: #8b7355; margin-top: 8px;
  animation: endingBlink 1.2s infinite;
}
@keyframes endingBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
#ending-screen .ending-stats-panel {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 50%, #0a0a2e 100%);
  opacity: 0; transition: opacity 1.5s; z-index: 10; pointer-events: none;
}
#ending-screen .ending-stats-panel.visible { opacity: 1; pointer-events: auto; }
#ending-screen .ending-stats-title {
  font-size: 2rem; font-weight: 900; color: #c9a84c; margin-bottom: 24px;
}

// 이벤트를 체크하고 해당하면 vnScenes에 삽입하는 함수
function checkAndInsertEvent(eventDef, vnScenes) {
  if (!eventDef) return;
  if (eventDef.condition && !eventDef.condition()) return;
  if (Math.random() >= eventDef.prob) return;
  vnScenes.push({ type:'contextEvent', eventDef });
}

  INFJ:{stats:{lawKnowledge:10},pro:{civilLaw:5,criminalLaw:5,familyLaw:5,adminLaw:5}},

  ISTP:{stats:{mental:10,debate:10,sales:10}},
  ISFP:{stats:{morality:10,observation:10,reputation:10}},
  INFP:{stats:{morality:10,debate:10,observation:10}},
  INTP:{stats:{debate:10,observation:10},pro:{civilLaw:5,criminalLaw:5}},
  ESTP:{stats:{charm:10,mental:10,sales:10}},
  ESFP:{stats:{sociability:10,charm:10,sales:10}},
  ENFP:{stats:{charm:10,sociability:10,stamina:10}},
  ENTP:{stats:{mental:10,observation:10,debate:10}},
  ESTJ:{stats:{stamina:10,mental:10,morality:10}},
  ESFJ:{stats:{stamina:10,sociability:10,sales:10}},
  ENFJ:{stats:{charm:10,sociability:10,morality:10}},
  ENTJ:{stats:{mental:10,sociability:10,stamina:10}},
};

function applyMBTIBonus(mbti) {
  const bonus = MBTI_BONUSES[mbti];
  if (!bonus) return;
  if (bonus.stats) {
    for (const k in bonus.stats) {
      if (G.stats[k] !== undefined) G.stats[k] = Math.min(999, G.stats[k] + bonus.stats[k]);
    }
  }
  if (bonus.pro) {
    for (const k in bonus.pro) {
      if (G.proStats[k] !== undefined) G.proStats[k] = Math.min(100, G.proStats[k] + bonus.pro[k]);
    }
  }
}

const BGM_NORMAL = ['bgm/bgm1.mp3','bgm/bgm2.mp3','bgm/bgm3.mp3','bgm/bgm4.mp3'];
const BGM_LOVE = ['bgm/lovetheme1.mp3','bgm/lovetheme2.mp3'];
const BGM_OPENING = 'bgm/opening theme.mp3';
const BGM_ENDING = 'bgm/trial theme.mp3';
let bgmAudio = null;
let bgmStarted = false;
let bgmCurrentMode = 'normal'; // 'normal','love','opening','ending'

function playBGM(mode) {
  if (!G.bgmOn) return;
  bgmCurrentMode = mode || 'normal';
  let src;
  if (bgmCurrentMode === 'opening') src = BGM_OPENING;
  else if (bgmCurrentMode === 'ending') src = BGM_ENDING;
  else if (bgmCurrentMode === 'love') src = BGM_LOVE[Math.floor(Math.random()*BGM_LOVE.length)];
  else src = BGM_NORMAL[Math.floor(Math.random()*BGM_NORMAL.length)];
  if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
  bgmAudio = new Audio(src);
  bgmAudio.volume = 0.4;
  bgmAudio.addEventListener('ended', () => playBGM(bgmCurrentMode));
  bgmAudio.play().catch(()=>{});
}
function playRandomBGM() { playBGM('normal'); }

function toggleBGM() {
  G.bgmOn = !G.bgmOn;
  if (G.bgmOn) {
    playRandomBGM();
  } else {
    if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
  }
}

function startBGMOnInteraction() {
  if (bgmStarted) return;
  bgmStarted = true;
  if (G.bgmOn) playBGM('opening');
}

let openingIdx = 0;

function startOpening() {
  document.getElementById('title-screen').style.display = 'none';
  const screen = document.getElementById('opening-screen');
  screen.style.display = 'block';
  openingIdx = 0;
  showOpeningScene(0);
  screen.onclick = advanceOpening;
}

function showOpeningScene(idx) {
  openingTransitioning = true;
  const scene = OPENING_SCENES[idx];
  const bgEl = document.getElementById('opening-bg');
  const textEl = document.getElementById('opening-text');

  // 텍스트 페이드아웃
  textEl.style.opacity = '0';

  // 첫 장면은 페이드아웃할 배경이 없으므로 바로 로드
  const fadeOutDelay = (idx === 0) ? 0 : 2500;

  // 배경 페이드아웃
  bgEl.style.opacity = '0';
  setTimeout(() => {
    // 페이드아웃 완료 후 새 이미지 로드
    bgEl.src = scene.bg;
    bgEl.onload = () => {
      // 페이드인 (2.5초)
      bgEl.style.opacity = '1';
      // 배경 페이드인 완료 후 텍스트 표시
      setTimeout(() => {
        textEl.style.whiteSpace = 'pre-line';
        textEl.textContent = scene.text;
        textEl.style.opacity = '1';
        // 텍스트 페이드인 완료 후 클릭 허용
        setTimeout(() => { openingTransitioning = false; }, 1500);
      }, 2500);
    };
  }, fadeOutDelay);
}

let openingTransitioning = false;
function advanceOpening() {
  if (openingTransitioning) return;
  openingIdx++;
  if (openingIdx < OPENING_SCENES.length) {
    openingTransitioning = true;
    showOpeningScene(openingIdx);
  } else {
    finishOpening();
  }
}

function finishOpening() {
  const screen = document.getElementById('opening-screen');
  const bgEl = document.getElementById('opening-bg');
  const textEl = document.getElementById('opening-text');

  // 텍스트 페이드아웃
  textEl.style.opacity = '0';

  // 배경 블러 처리
  bgEl.style.filter = 'blur(5px)';
  bgEl.style.transition = 'filter 1s, opacity 1.5s';

  setTimeout(() => {
    screen.onclick = null;
    // 성별+이름+MBTI+생일 통합 선택 UI 표시
    screen.style.cursor = 'default';
    showCharCreateOnOpening();
  }, 800);
}

// ==================== SCHEDULE ====================
function openScheduleOverlay() {
  document.getElementById('stats-panel').style.display = 'none';
  // 이미 이번 달 스케줄이 빌드되어 있으면 재빌드하지 않음 (강제배치 스케줄 보존)
  if (!G.schedule || G.schedule.length === 0 || G._scheduleBuiltFor !== G.year + '-' + G.month) {
    buildSchedule();
    G._scheduleBuiltFor = G.year + '-' + G.month;
  } else {
    // 스케줄은 유지하되 렌더링만 다시
    const actualYear = 2029 + G.year;
    const daysInMonth = new Date(actualYear, G.month, 0).getDate();
    const firstDayOfWeek = new Date(actualYear, G.month - 1, 1).getDay();
    renderSchedule(daysInMonth, firstDayOfWeek);
  }
  document.getElementById('schedule-overlay').style.display = 'flex';
}
function closeScheduleOverlay() {
  document.getElementById('schedule-overlay').style.display = 'none';
}

function buildSchedule() {
  const actualYear = 2029 + G.year;
  const daysInMonth = new Date(actualYear, G.month, 0).getDate();
  const firstDayOfWeek = new Date(actualYear, G.month - 1, 1).getDay();
  const weekdayCount = countWeekdays(actualYear, G.month);
  const trialSlots = (G.status === 'suspended') ? 0 : Math.min(weekdayCount, Math.floor(G.cases / 6));

  const holidays = getHolidays(actualYear, G.month);

  G.schedule = [];
  let weekdayList = [];
  for (let d=1;d<=daysInMonth;d++) {
    const dow = new Date(actualYear,G.month-1,d).getDay();
    if (dow!==0&&dow!==6&&!holidays[d]) weekdayList.push(d);
  }
  let trialDays = [];
  if (trialSlots > 0 && weekdayList.length > 0) {
    const step = weekdayList.length / trialSlots;
    for (let i=0;i<trialSlots;i++) trialDays.push(weekdayList[Math.floor(i*step)]);
  }

  // 신분별 일과시간 스케줄 규칙:
  // associate: 재판/서면/상담 모두 locked
  // partner: 재판+상담 locked, 나머지 일과시간 자유 (서면 or 기타)
  // senior/solo: 재판만 locked, 나머지 일과시간 자유
  // suspended: 재판/상담/서면 불가, 모든 일과시간 자유 (학습/사회/여가만)
  const st = G.status;

  for (let d=1;d<=daysInMonth;d++) {
    const dow = new Date(actualYear,G.month-1,d).getDay();
    const isWeekend = dow===0||dow===6;
    const isHoliday = !!holidays[d];
    const holidayName = holidays[d] || '';
    const isDayOff = isWeekend || isHoliday;
    const isTrial = trialDays.includes(d);
    const isSpecialTraining = dow===6 && d<=7;
    let ds = {day:d,dow,isWeekend,isHoliday,holidayName,slots:[]};

    if (isDayOff) {
      if (isSpecialTraining) {
        ds.slots.push({time:'all',action:'specialTraining',label:'특별연수',locked:false,slotClass:'slot-special'});
      } else {
        ds.slots.push({time:'all',action:null,label:'미정',locked:false,slotClass:''});
      }
    } else {
      // 일과시간 슬롯
      if (isTrial) {
        // 재판은 모든 신분(suspended 제외)에서 locked
        ds.slots.push({time:'day',action:'trial',label:'재판',locked:true,slotClass:'slot-trial'});
      } else if (st === 'associate') {
        // 어쏘: 서면/상담 랜덤 배정, locked
        const isDoc = Math.random()<0.5;
        ds.slots.push({time:'day',action:isDoc?'document':'consult',label:isDoc?'서면작성':'상담',locked:true,slotClass:'slot-work'});
      } else if (st === 'partner') {
        // 파트너: 공식에 따라 상담일정 수 결정 (buildSchedule에서 후처리)
        ds.slots.push({time:'day',action:null,label:'미정',locked:false,slotClass:'',isDaytime:true});
      } else if (st === 'senior' || st === 'solo') {
        // 대표/개업: 재판 외 모두 자유
        ds.slots.push({time:'day',action:null,label:'미정',locked:false,slotClass:'',isDaytime:true});
      } else if (st === 'inhouse' || st === 'inhouseTeam' || st === 'inhouseExec') {
        // 사내변호사: 일과시간 모두 회사업무
        ds.slots.push({time:'day',action:'companyWork',label:'회사업무',locked:true,slotClass:'slot-work'});
      } else if (st === 'suspended') {
        // 휴업: 모든 일과시간 자유 (단 재판/상담/서면 불가)
        ds.slots.push({time:'day',action:null,label:'미정',locked:false,slotClass:'',isDaytime:true,suspendedSlot:true});
      }
      // 저녁시간 슬롯
      ds.slots.push({time:'evening',action:null,label:'미정',locked:false,slotClass:''});
    }
    G.schedule.push(ds);
  }
  // 파트너: 상담일정 공식에 따라 고정 배치
  if (st === 'partner') {
    const rawConsult = Math.floor(G.stats.reputation/100 + G.stats.sales/100);
    const freeDaySlots = G.schedule.filter(ds=>!ds.isWeekend && ds.slots[0] && !ds.slots[0].locked && ds.slots[0].isDaytime);
    const maxConsult = Math.floor(freeDaySlots.length / 2);
    const consultCount = Math.min(rawConsult, maxConsult);
    // 균등 배치
    if (consultCount > 0 && freeDaySlots.length > 0) {
      const step = freeDaySlots.length / consultCount;
      for (let i=0; i<consultCount; i++) {
        const ds = freeDaySlots[Math.floor(i*step)];
        ds.slots[0].action='consult'; ds.slots[0].label='상담'; ds.slots[0].locked=true; ds.slots[0].slotClass='slot-work';
        delete ds.slots[0].isDaytime;
      }
    }
  }

  // 방송 수락 시: 빈 평일 낮 슬롯에 방송 고정 배정
  if (pendingBroadcast) {
    pendingBroadcast = false;
    const candidates = [];
    G.schedule.forEach((ds,di) => {
      if(ds.isWeekend || ds.isHoliday) return;
      ds.slots.forEach((slot,si) => {
        if(!slot.locked && slot.isDaytime && (!slot.action || slot.action===null)) candidates.push({di,si});
      });
    });
    if(candidates.length > 0) {
      const pick = candidates[Math.floor(Math.random()*candidates.length)];
      const slot = G.schedule[pick.di].slots[pick.si];
      slot.action='broadcast'; slot.label='방송'; slot.slotClass='slot-special'; slot.locked=true;
      delete slot.isDaytime;
    }
  }

  // 강사 스케줄 적용 (일요일 낮 → 법학강의 고정)
  if (G.isLecturer) {
    G.schedule.forEach(ds => {
      if (ds.dow === 0) {
        ds.slots.forEach(slot => {
          if (slot.time === 'all' || slot.time === 'day') {
            slot.action = 'lectureLaw';
            slot.label = '법학강의';
            slot.slotClass = 'slot-study';
            slot.locked = true;
          }
        });
      }
    });
  }

  // 연애이벤트 예약 스케줄 배치 (와인대회준비, 미술관 등)
  if (G.pendingSchedules && G.pendingSchedules.length > 0) {
    const toProcess = [...G.pendingSchedules];
    G.pendingSchedules = [];
    toProcess.forEach(ps => {
      let targetDay = null;
      if (ps.target === '2ndSat') {
        // 두번째 토요일 찾기
        let satCount = 0;
        for (const ds of G.schedule) {
          if (ds.dow === 6) { satCount++; if (satCount === 2) { targetDay = ds; break; } }
        }
      } else if (ps.target === '1stSun') {
        // 첫번째 일요일 찾기
        for (const ds of G.schedule) {
          if (ds.dow === 0) { targetDay = ds; break; }
        }
      }
      if (targetDay) {
        const label = ps.type === 'winePrep' ? '와인대회' : ps.type === 'museum' ? '미술관' : ps.type === 'wedding' ? '결혼식' : '여행';
        const action = ps.type === 'winePrep' ? 'wineMeet' : ps.type === 'museum' ? 'travel' : ps.type === 'wedding' ? 'wedding' : 'travel';
        const slotClass = 'slot-special';
        targetDay.slots.forEach(slot => {
          slot.action = action;
          slot.label = label;
          slot.slotClass = slotClass;
          slot.locked = true;
        });
      }
    });
  }

  G._scheduleBuiltFor = G.year + '-' + G.month;
  renderSchedule(daysInMonth, firstDayOfWeek);
}

function countWeekdays(y,m) {
  const days=new Date(y,m,0).getDate(); let c=0;
  for(let d=1;d<=days;d++){if(new Date(y,m-1,d).getDay()%6!==0)c++;}return c;
}

function renderSchedule(daysInMonth, firstDayOfWeek) {
  const sv = document.getElementById('schedule-view');
  const dn = ['일','월','화','수','목','금','토'];
  let html = `<div class="overlay-title">${G.year}년차 ${G.month}월 - 스케줄 배치</div>`;
  html += '<div class="schedule-grid">';
  html += '<div class="schedule-header"></div>';
  dn.forEach((n,i) => { html += `<div class="schedule-header ${i===0?'sun':i===6?'sat':''}">${n}</div>`; });

  let dayNum=1, weekNum=1;
  const totalCells = Math.ceil((daysInMonth+firstDayOfWeek)/7)*7;
  for (let i=0;i<totalCells;i++) {
    if (i%7===0) { html += `<div class="schedule-week-label">${weekNum}주</div>`; weekNum++; }
    if (i<firstDayOfWeek||dayNum>daysInMonth) {
      html += '<div class="schedule-cell" style="opacity:0.2"></div>';
    } else {
      const ds = G.schedule[dayNum-1];
      const hasEditable = ds.slots.some(s=>!s.locked);
      const dayColor = ds.isHoliday ? 'color:#e06060' : (ds.dow===0?'color:#e06060':ds.dow===6?'color:#6088e0':'');
      let cc = `<div class="day-num" style="${dayColor}">${dayNum}일${ds.holidayName?` <span style="font-size:0.55rem">${ds.holidayName}</span>`:''}</div>`;
      ds.slots.forEach((slot, si) => {
        const tl = slot.time==='day'?'낮 ':(slot.time==='evening'?'저녁 ':'');
        if (!slot.locked && !slot.action) {
          cc += `<div class="slot slot-empty" onclick="event.stopPropagation();openActionModalSlot(${dayNum-1},${si})">${tl}클릭하여 선택</div>`;
        } else if (!slot.locked && slot.action) {
          cc += `<div class="slot ${slot.slotClass}" onclick="event.stopPropagation();openActionModalSlot(${dayNum-1},${si})" style="cursor:pointer">${tl}${slot.label}</div>`;
        } else {
          cc += `<div class="slot ${slot.action?slot.slotClass:''}">${tl}${slot.label}</div>`;
        }
      });
      const cls = hasEditable?'editable':(ds.slots.every(s=>s.locked)?'locked':'');
      html += `<div class="schedule-cell ${cls}">${cc}</div>`;
      dayNum++;
    }
  }
  html += '</div>';
  html += `<div class="schedule-actions">
    <button class="btn btn-secondary" onclick="autoFillSchedule()">자동 배치</button>
    <button class="btn btn-primary" onclick="startExecution()">스케줄 진행</button>
  </div>`;
  sv.innerHTML = html;
}

function openActionModal(dayIdx) {
  const ds = G.schedule[dayIdx];
  // currentEditSlot이 이미 지정되어있으면 그걸 사용, 아니면 첫 editable
  if (currentEditSlot < 0 || currentEditSlot >= ds.slots.length || ds.slots[currentEditSlot].locked) {
    const editableSlots = ds.slots.filter(s=>!s.locked);
    if (!editableSlots.length) return;
    currentEditSlot = ds.slots.indexOf(editableSlots[0]);
  }
  currentEditDay = dayIdx;
  const slot = ds.slots[currentEditSlot];

  document.getElementById('action-modal').style.display = 'flex';
  const isFirstSat = ds.dow===6 && ds.day<=7;
  const isDaytime = slot.isDaytime || false;

  let html = '';

  // 일과시간 자유 슬롯일 때 업무 활동도 선택지에 추가 (파트너/대표/개업)
  if (isDaytime && !isSuspended) {
    html += `<div class="action-category"><div class="action-category-title">업무</div>`;

      <div><div class="name">서면작성</div><div class="effects">법률지식, 관찰력, 준비도 상승</div></div>
      <div class="cost">-</div></div>`;

      const canConsult = G.consultQuota > 0;
      html += `<div class="action-option" onclick="${canConsult?`selectAction('consult')`:''}" style="${canConsult?'':'opacity:0.4;cursor:default'}">
        <div><div class="name">상담</div><div class="effects">영업력, 관찰력 상승 / 수임 가능 (대기 의뢰인: ${G.consultQuota}명)</div></div>
        <div class="cost">-</div></div>`;
    }
    if (G.status === 'partner' || G.status === 'senior' || G.status === 'solo') {
      html += `<div class="action-option" onclick="selectAction('hoemu')">
        <div><div class="name">회무</div><div class="effects">사교성 +2, 영업력 +1, 명성 +1, 자금 +5만원</div></div>
        <div class="cost">-</div></div>`;
    }
    // 어쏘 교육 (파트너/대표/개업, 어쏘가 있어야)
    if ((G.status === 'partner' || G.status === 'senior' || G.status === 'solo') && G.hiredAssocs.length > 0) {
      html += `<div class="action-option" onclick="selectAction('assocTraining')">
        <div><div class="name">어쏘 교육</div><div class="effects">어쏘변호사의 능력치를 교육합니다</div></div>
        <div class="cost">-</div></div>`;
    }
    // 의정활동 (시의원일 때)
    ensureRomance(); // 하위호환 보장
    if (G.isCityCouncil) {
      html += `<div class="action-option" onclick="selectAction('councilWork')">
        <div><div class="name">의정활동</div><div class="effects">변론능력 +2, 관찰력 +2, 명성 +2, 업보 +1</div></div>
        <div class="cost">-</div></div>`;
    }
    html += '</div>';
  }

  for (const ck in EVENING_ACTIONS) {
    const cat = EVENING_ACTIONS[ck];
    html += `<div class="action-category"><div class="action-category-title">${cat.category}</div>`;
    cat.items.forEach(item => {
      // 대학원 수료 후 대학원 숨김
      if(item.id==='gradSchool' && G.gradSchoolCompleted) return;
      // 골프: 신분 제한 + 평일 저녁 제외 (일과시간, 휴일에만 가능)
      if(item.id==='golf') {
        if(!(G.status==='partner'||G.status==='senior'||G.status==='solo'||G.status==='suspended')) return;
        if(slot.time==='evening' && !ds.isWeekend && !ds.isHoliday) return; // 평일 저녁 불가
      }
      // 드라이브: 차가 없으면 숨김
      if(item.id==='drive' && !G.currentCar) return;
      // 아르바이트: 일과시간에는 숨김 (저녁/주말만)
      if(item.id==='partTimeJob' && isDaytime && !isSuspended) return;
      const cost = item.cost>0?`${(item.cost/10000)}만원`:'무료';
      const effs = [];
      for(const k in item.effects) if(STAT_NAMES[k]) effs.push(`${STAT_NAMES[k]} ${item.effects[k]>0?'+':''}${item.effects[k]}`);
      html += `<div class="action-option" onclick="selectAction('${item.id}')">
        <div><div class="name">${item.name}</div><div class="effects">${effs.join(', ')}</div></div>

    });
    // 대학원 수료 후 & 박사 미취득 시 박사논문 선택지 추가
    if(ck==='social' && G.gradSchoolCompleted && !G.phdCompleted) {
      html += `<div class="action-option" onclick="selectAction('phdThesis')">
        <div><div class="name">박사논문</div><div class="effects">박사논문 진척도 +3, 스트레스 +3, 피로도 +5 (진척도: ${G.phdProgress.toFixed(0)}/100)</div></div>
        <div class="cost">무료</div></div>`;
    }

      <div class="action-option" onclick="selectAction('specialTraining')">
        <div><div class="name">${pn} 특별연수</div><div class="effects">전문능력치 +5, 도덕성 +1, 스트레스 +3, 피로도 +2</div></div>
        <div class="cost">10만원</div></div></div>`;
  }
  // 병원 선택지 (질병 상태일 때, 저녁/휴일 슬롯)
  if (G.isSick && (slot.time==='evening' || ds.isWeekend || ds.isHoliday)) {
    html += `<div class="action-category"><div class="action-category-title">치료</div>
      <div class="action-option" onclick="selectAction('hospital')">
        <div><div class="name">병원</div><div class="effects">질병 치료</div></div>
        <div class="cost">무료</div></div></div>`;
  }
  // 해외여행 선택지 (휴일 슬롯일 때)
  if (ds.isWeekend || ds.isHoliday) {
    // 연속 휴일 수 계산 (currentEditDay부터)
    let consecutiveHolidays = 0;
    for(let ci=currentEditDay; ci<G.schedule.length; ci++){
      const cds = G.schedule[ci];
      if(cds.isWeekend || cds.isHoliday) consecutiveHolidays++;
      else break;
    }
    if(consecutiveHolidays >= 3) {
      html += `<div class="action-category"><div class="action-category-title">해외여행</div>`;
      html += `<div class="action-option" onclick="selectAction('japanTrip')">
        <div><div class="name">일본여행</div><div class="effects">3일 소요</div></div>
        <div class="cost">100만원</div></div>`;
      if(consecutiveHolidays >= 4) {
        html += `<div class="action-option" onclick="selectAction('seaTrip')">
          <div><div class="name">동남아여행</div><div class="effects">4일 소요</div></div>
          <div class="cost">100만원</div></div>`;
      }
      if(consecutiveHolidays >= 5) {
        html += `<div class="action-option" onclick="selectAction('europeTrip')">
          <div><div class="name">유럽여행</div><div class="effects">5일 소요</div></div>
          <div class="cost">200만원</div></div>`;
      }
      html += '</div>';
    }
  }
  // 데이트 선택지 (연인이 있을 경우, 저녁/휴일 슬롯)
  ensureRomance();
  if (G.romance.dating && (slot.time==='evening' || ds.isWeekend || ds.isHoliday)) {
    const datingTarget = getRomanceTargets().find(t=>t.id===G.romance.dating);
    const datingName = datingTarget ? datingTarget.name : '연인';
    html += `<div class="action-category"><div class="action-category-title">연애</div>
      <div class="action-option" onclick="selectAction('date')">

        <div class="cost">20만원</div></div></div>`;

  // 선거운동 선택지 (출마 수락 후, 출마연도 2~6월, 저녁/주말)
  if (G.politicsAccepted) {

  document.getElementById('modal-actions').innerHTML = html;
}

function selectAction(actionId) {
  const slot = G.schedule[currentEditDay].slots[currentEditSlot];
  if (actionId==='specialTraining') {
    slot.action='specialTraining'; slot.label=PRO_NAMES[MONTH_SPECIAL[G.month]]+' 특별연수'; slot.slotClass='slot-special';
  } else if (actionId==='document') {
    slot.action='document'; slot.label='서면작성'; slot.slotClass='slot-work';
  } else if (actionId==='hoemu') {
    slot.action='hoemu'; slot.label='회무'; slot.slotClass='slot-special';
  } else if (actionId==='broadcast') {
    slot.action='broadcast'; slot.label='방송'; slot.slotClass='slot-special';
  } else if (actionId==='phdThesis') {
    slot.action='phdThesis'; slot.label='박사논문'; slot.slotClass='slot-study';
  } else if (actionId==='consult') {
    if ((G.status==='senior'||G.status==='solo') && G.consultQuota > 0) G.consultQuota--;
    slot.action='consult'; slot.label='상담'; slot.slotClass='slot-work';
  } else if (actionId==='date') {
    slot.action='date'; slot.label='데이트'; slot.slotClass='slot-social';
  } else if (actionId==='hospital') {
    slot.action='hospital'; slot.label='병원'; slot.slotClass='slot-special';
  } else if (actionId==='assocTraining') {
    slot.action='assocTraining'; slot.label='어쏘 교육'; slot.slotClass='slot-work';
  } else if (actionId==='campaign') {
    slot.action='campaign'; slot.label='선거운동'; slot.slotClass='slot-special';
  } else if (actionId==='councilWork') {
    slot.action='councilWork'; slot.label='의정활동'; slot.slotClass='slot-special';
  } else if (actionId==='golf') {
    slot.action='golf'; slot.label='골프모임'; slot.slotClass='slot-social';
  } else if (actionId==='partTimeJob') {
    slot.action='partTimeJob'; slot.label='아르바이트'; slot.slotClass='slot-rest';
  } else if (actionId==='drive') {
    slot.action='drive'; slot.label='드라이브'; slot.slotClass='slot-rest';
  } else if (actionId==='japanTrip') {
    for(let i=0;i<3&&(currentEditDay+i)<G.schedule.length;i++){
      const ds=G.schedule[currentEditDay+i];
      ds.slots.forEach(s=>{s.action='japanTrip';s.label='일본여행';s.slotClass='slot-rest';s.locked=true;});
    }
  } else if (actionId==='seaTrip') {
    for(let i=0;i<4&&(currentEditDay+i)<G.schedule.length;i++){
      const ds=G.schedule[currentEditDay+i];
      ds.slots.forEach(s=>{s.action='seaTrip';s.label='동남아여행';s.slotClass='slot-rest';s.locked=true;});
    }
  } else if (actionId==='europeTrip') {
    for(let i=0;i<5&&(currentEditDay+i)<G.schedule.length;i++){
      const ds=G.schedule[currentEditDay+i];
      ds.slots.forEach(s=>{s.action='europeTrip';s.label='유럽여행';s.slotClass='slot-rest';s.locked=true;});
    }
  } else {
    for(const ck in EVENING_ACTIONS){
      const f=EVENING_ACTIONS[ck].items.find(i=>i.id===actionId);
      if(f){slot.action=actionId;slot.label=f.name;slot.slotClass=ck==='study'?'slot-study':ck==='social'?'slot-social':'slot-rest';break;}
    }
  }
  document.getElementById('action-modal').style.display='none';
  const ay=2029+G.year;
  renderSchedule(new Date(ay,G.month,0).getDate(), new Date(ay,G.month-1,1).getDay());
}

function autoFillSchedule() {
  const defs=['lawStudy','speech','studyGroup','homeRest','sportClub','industryMeet'];
  G.schedule.forEach(ds=>{ds.slots.forEach(slot=>{
    if(!slot.locked&&!slot.action){
      if(ds.dow===6&&ds.day<=7){slot.action='specialTraining';slot.label=PRO_NAMES[MONTH_SPECIAL[G.month]]+' 특별연수';slot.slotClass='slot-special';}
      else{const p=defs[Math.floor(Math.random()*defs.length)];
        for(const ck in EVENING_ACTIONS){const f=EVENING_ACTIONS[ck].items.find(i=>i.id===p);
          if(f){slot.action=p;slot.label=f.name;slot.slotClass=ck==='study'?'slot-study':ck==='social'?'slot-social':'slot-rest';break;}}
      }
    }
  });});
  const ay=2029+G.year;
  renderSchedule(new Date(ay,G.month,0).getDate(), new Date(ay,G.month-1,1).getDay());
}

// 매월 어쏘 재판 처리 + 직원 수임 처리
function processEmployeesMonthly() {
  let reports = [];
  // 어쏘 재판
  G.hiredAssocs.forEach(assoc => {
    const trialsThisMonth = Math.min(3, assoc.cases.length);
    for (let i=0; i<trialsThisMonth; i++) {
      if (!assoc.cases.length) break;
      const c = assoc.cases.shift();
      const diffMod = getDiffModifier(c.difficulty);
      const wr = 20 + assoc.lawKnowledge*0.05 + assoc.debate*0.05 + assoc.observation*0.05 + diffMod;
      const won = Math.random()*100 < wr;
      if (won) {
        G.wins++;
        const reward = Math.floor(G.stats.reputation * 3000 * G.successFeeRate);
        if(reward>0){G.funds+=reward; statChanges.funds+=reward;}
        reports.push({text:`${assoc.name} 변호사: ${c.id} ${c.typeName}[${c.diffName}] 승소!${reward>0?' +'+Math.floor(reward/10000)+'만원':''}`,cls:'log-great'});
      } else {
        G.losses++;
        reports.push({text:`${assoc.name} 변호사: ${c.id} ${c.typeName}[${c.diffName}] 패소`,cls:'log-fail'});
      }
    }
  });
  // 직원 수임
  G.hiredStaff.forEach(staff => {
    const caseCount = Math.floor(staff.sales / 100);
    for (let i=0; i<caseCount; i++) {
      const card = createCaseCard();
      const feeBaseRaw = (3300000+G.stats.sales*3000+G.stats.reputation*3000)*G.caseFeeMultiplier*(0.5+Math.random());
      const feeBase = Math.floor(feeBaseRaw/10000)*10000;
      const fee = Math.floor(feeBase * G.caseFeeRate);
      // 주인공 사건이 60건 미만이면 주인공에게
      if (G.cases < 60) {
        G.caseCards.push(card); G.cases++; G.yearCases++;
        if(fee>0){G.funds+=fee;statChanges.funds+=fee;}
        reports.push({text:`직원 ${staff.name}: ${card.id} ${card.typeName}[${card.diffName}] 수임${fee>0?' +'+Math.floor(fee/10000)+'만원':''}`,cls:'log-success'});
      } else {
        // 어쏘에게 배정
        const avail = G.hiredAssocs.find(a=>a.cases.length<20);
        if (avail) {
          avail.cases.push(card);
          if(fee>0){G.funds+=fee;statChanges.funds+=fee;}
          reports.push({text:`직원 ${staff.name}: ${card.id} → ${avail.name} 변호사에게 배정${fee>0?' +'+Math.floor(fee/10000)+'만원':''}`,cls:'log-info'});
        }
      }
    }
  });
  return reports;
}

function getHolidays(year, month) {
  const holidays = {}; // day -> name
  // 고정 공휴일
  for (const key in FIXED_HOLIDAYS) {
    const [m,d] = key.split('-').map(Number);
    if (m === month) holidays[d] = FIXED_HOLIDAYS[key];
  }
  // 음력 공휴일
  const lunar = LUNAR_HOLIDAYS[year];
  if (lunar) {
    const s = lunar.seol;
    for (let i=0;i<s.length;i+=2) { if(s[i]===month) holidays[s[i+1]]='설날'; }
    const b = lunar.buddha;
    if (b[0]===month) holidays[b[1]]='부처님오신날';
    const c = lunar.chuseok;
    for (let i=0;i<c.length;i+=2) { if(c[i]===month) holidays[c[i+1]]='추석'; }
  }
  return holidays;
}

function weightedRandom(items) {
  const total = items.reduce((s,i)=>s+i.weight,0);
  let r = Math.random()*total;
  for (const item of items) { r-=item.weight; if(r<=0) return item; }
  return items[items.length-1];
}

function getSpecialLawyerCaseTypes() {
  if (!G.specialLawyer || G.specialLawyer.length === 0) return CASE_TYPES;
  // 전문등록 분야의 고정 확률 계산
  let fixedTotal = 0;
  const specialSet = new Set(G.specialLawyer);
  specialSet.forEach(id => {
    if (id === 'criminalLaw' || id === 'familyLaw') fixedTotal += 30;
    else fixedTotal += 20;
  });
  const remaining = 100 - fixedTotal;
  // 미등록 분야의 기존 weight 합
  let unregWeightSum = 0;
  CASE_TYPES.forEach(ct => { if (!specialSet.has(ct.id)) unregWeightSum += ct.weight; });
  if (unregWeightSum === 0) return CASE_TYPES;
  // 동적 weight 배열 생성
  return CASE_TYPES.map(ct => {
    if (specialSet.has(ct.id)) {
      const fixedProb = (ct.id === 'criminalLaw' || ct.id === 'familyLaw') ? 30 : 20;
      return { ...ct, weight: fixedProb };
    } else {
      return { ...ct, weight: (remaining * ct.weight) / unregWeightSum };
    }
  });
}

function createCaseCard() {
  const actualYear = 2029 + G.year;
  G.yearCaseSeq++;
  const dynamicCaseTypes = getSpecialLawyerCaseTypes();
  const caseType = weightedRandom(dynamicCaseTypes);
  const diff = weightedRandom(DIFFICULTIES);
  return {
    id: `${actualYear}-${G.yearCaseSeq}`,
    typeId: caseType.id,
    typeName: caseType.name,
    difficulty: diff.id,
    diffName: diff.name,
    order: Date.now() + Math.random(), // 수임 순서 (FIFO용)
  };
}

function getOldestCase() {
  if (G.caseCards.length === 0) return null;
  G.caseCards.sort((a,b)=>a.order-b.order);
  return G.caseCards[0];
}

function removeCaseCard(caseId) {
  G.caseCards = G.caseCards.filter(c=>c.id!==caseId);
}

function getDiffModifier(diff) {
  const d = DIFFICULTIES.find(x=>x.id===diff);
  return d ? d.modifier : 0;
}

// 데이트 이벤트 체크
function checkDateEvent(datingId, datingName, datingFace) {
  ensureRomance();
  const targets = getRomanceTargets();

  // 0. 연인/배우자 생일 이벤트 (생일 달에 데이트하면 100% 발생, 월 1회)
  const datingTarget = targets.find(t=>t.id===datingId);
  if (datingTarget && datingTarget.birthday && !G._partnerBirthdayDone) {
    const [bm] = datingTarget.birthday.split('-').map(Number);
    if (bm === G.month) {
      G._partnerBirthdayDone = true;
      G.funds -= 1000000; statChanges.funds -= 1000000;
      if (!G.romance.affection[datingId]) G.romance.affection[datingId] = 0;
      G.romance.affection[datingId] = Math.min(100, G.romance.affection[datingId] + 10);
      return {
        id:'partnerBirthday', bg:'배경/생일.webp', face:datingFace,
        dialogues:[
          {speaker:G.name, text:`${datingName}, 생일 축하해! 이거 선물이야.`},
          {speaker:datingName, text:'어머, 이걸 준비했어? 너무 감동이야!'},

        {speaker:datingName, text:'오.. 제법인데?'}
      ],
      replyIfNot:[
        {speaker:G.name, text:'음... 잘 모르겠는데'},
        {speaker:datingName, text:'진짜 무관심하다. 에그'}
      ],
      affIfNoticed: 5, affIfNot: -3
    };
  }
  if (G.gender === 'female' && Math.random() < 0.05) {
    return {
      id:'dateLate', bg:'배경/식당.webp', face:datingFace,
      dialogues:[
        {speaker:G.name, text:'아, 미안, 좀 늦었지?'},
        {speaker:datingName, text:'왜 이렇게 늦었어?'}
      ],
      prompt:'',
      choices:[
        {text:'지금 나한테 화내는 거야?', affDelta:-5, effects:{}, replyDialogues:[
          {speaker:datingName, text:'하... 늘 그런식의 반응 지친다.. 화내는게 아니라 그냥 물어보는 거잖아.'}
        ]},
        {text:'미안, 길이 많이 막혔어', affDelta:-3, effects:{}, replyDialogues:[
          {speaker:datingName, text:'그러니까 내가 대중교통 타고 오라고 했는데 에흉.'}
        ]},
        {text:'자기한테 예뻐보이려고 화장하다가 좀 늦었네!', affDelta:5, effects:{}, replyDialogues:[
          {speaker:datingName, text:'지금도 너무 예쁜데 뭘 얼마나 더 예뻐지려고, 에궁'}
        ]}
      ]
    };
  }
  // 6. 기념일 이벤트 (결혼 기념일, 100% 발생, 월 1회)
  ensureRomance();
  if (G.marriageMonth > 0 && G.month === G.marriageMonth && G.isMarried && !G.anniversaryDone) {
    G.anniversaryDone = true;
    return {
      id:'anniversary', bg:'배경/식당.webp', face:datingFace,
      dialogues:[
        {speaker:G.name, text:'우리 결혼한지 벌써 오래됐네.'},
        {speaker:datingName, text:'그러게. 시간이 정말 빠르다.'},
        {speaker:G.name, text:'앞으로도 잘 부탁해.'},
        {speaker:datingName, text:'나야말로. 항상 고마워.'}
      ],
      autoResolve: false,
      noChoice: true,
      affDelta: 10,
      stressDelta: -10
    };
  }

  // 7. 깜짝 선물 (배우자 호감도 100, 10% 확률)
  if (G.isMarried && (G.romance.affection[datingId]||0) >= 100 && Math.random() < 0.10) {
    const unownedItems = SHOP_ITEMS.filter(i => {
      if (i.gender && i.gender !== G.gender) return false;
      if (getItemCount(i.id) >= (i.max||1)) return false;
      return true;
    });
    let giftItem = null;
    if (unownedItems.length > 0) {
      giftItem = unownedItems[Math.floor(Math.random()*unownedItems.length)];
    }
    if (giftItem) {
      return {
        id:'surpriseGift', bg:'배경/식당.webp', face:datingFace,
        dialogues:[
          {speaker:datingName, text:G.name+', 오늘 깜짝 선물이 있어!'},
          {speaker:G.name, text:'뭔데?'},
          {speaker:datingName, text:'짜잔! 이거 갖고 싶어 하던 거 아니야?'},
          {speaker:G.name, text:'와, 이걸 어떻게 알았어?'}
        ],
        noChoice: true,
        affDelta: 0,
        giftItem: giftItem
      };
    }
  }

  return null;
}

// 데이트 이벤트 표시
let dateEventCallback = null;
let currentDateEvent = null;
let dateEventDialogueIdx = 0;
let dateEventPhase = 'dialogue'; // 'dialogue','choice','reply'
let dateEventReplyDialogues = null;
let dateEventReplyIdx = 0;

function showDateEvent(evt, cb) {
  dateEventCallback = cb;
  currentDateEvent = evt;
  dateEventDialogueIdx = 0;
  dateEventPhase = 'dialogue';
  dateEventReplyDialogues = null;
  dateEventReplyIdx = 0;

  const modal = document.getElementById('status-event-modal');
  resetModalStyle(true);
  modal.style.display = 'flex';
  document.getElementById('se-bg').style.backgroundImage = `url('${evt.bg}')`;
  playBGM('love');
  advanceDateEvent();
}

function advanceDateEvent() {
  const evt = currentDateEvent;
  if (!evt) return;

  if (dateEventPhase === 'dialogue') {
    if (dateEventDialogueIdx < evt.dialogues.length) {
      const dlg = evt.dialogues[dateEventDialogueIdx];
      const isPlayer = dlg.speaker === G.name;
      document.getElementById('se-face').style.display = 'block';
      document.getElementById('se-face-img').src = isPlayer ? getPlayerFace() : evt.face;
      document.getElementById('se-dialog').classList.remove('no-face');
      document.getElementById('se-speaker').textContent = dlg.speaker;
      document.getElementById('se-text').textContent = dlg.text;
      dateEventDialogueIdx++;
      document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="advanceDateEvent()">▼ 계속</button>`;
    } else {
      // 대사 끝
      if (evt.autoResolve) {
        // 나 뭐 변한거 없어? - 자동 판정
        dateEventPhase = 'reply';
        dateEventReplyDialogues = evt.noticed ? evt.replyIfNoticed : evt.replyIfNot;
        const affD = evt.noticed ? evt.affIfNoticed : evt.affIfNot;
        ensureRomance();
        const did = G.romance.dating;
        if (did) G.romance.affection[did] = Math.min(100, Math.max(0, (G.romance.affection[did]||0) + affD));
        dateEventReplyIdx = 0;
        advanceDateEvent();
      } else if (evt.noChoice) {
        // 선택지 없는 이벤트 (기념일, 깜짝선물 등)
        ensureRomance();
        const did = G.romance.dating;
        if (did && evt.affDelta) {
          G.romance.affection[did] = Math.min(100, Math.max(0, (G.romance.affection[did]||0) + evt.affDelta));
        }
        if (evt.stressDelta) { applyStat('stress', evt.stressDelta); }
        // 깜짝 선물 아이템 지급
        if (evt.giftItem) {
          const gi = evt.giftItem;
          if (!G.inventory[gi.id]) G.inventory[gi.id] = 0;
          G.inventory[gi.id]++;
          if (gi.effects) {
            for (const k in gi.effects) {
              if (G.stats[k] !== undefined) {
                G.stats[k] = Math.max(0, Math.min(999, G.stats[k] + gi.effects[k]));
              }
            }
          }
          showToast(gi.name + '을(를) 선물받았습니다!');
        }
        finishDateEvent();
      } else {
        // 선택지 표시
        dateEventPhase = 'choice';
        document.getElementById('se-face').style.display = 'block';
        document.getElementById('se-face-img').src = getPlayerFace();
        document.getElementById('se-speaker').textContent = G.name;
        document.getElementById('se-text').textContent = evt.prompt || '어떡하지?';
        let html = '';
        const labels = ['A','B','C'];
        evt.choices.forEach((c, i) => {
          html += `<button class="event-choice" onclick="applyDateEventChoice(${i})">${labels[i]}. ${c.text}</button>`;
        });
        document.getElementById('se-choices').innerHTML = html;
      }
    }
  } else if (dateEventPhase === 'reply') {
    if (dateEventReplyIdx < dateEventReplyDialogues.length) {
      const dlg = dateEventReplyDialogues[dateEventReplyIdx];
      const isPlayer = dlg.speaker === G.name;
      document.getElementById('se-face').style.display = 'block';
      document.getElementById('se-face-img').src = isPlayer ? getPlayerFace() : currentDateEvent.face;
      document.getElementById('se-speaker').textContent = dlg.speaker;
      document.getElementById('se-text').textContent = dlg.text;
      dateEventReplyIdx++;
      document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="advanceDateEvent()">▼ 계속</button>`;
    } else {
      finishDateEvent();
    }
  }
}

function applyDateEventChoice(idx) {
  const evt = currentDateEvent;
  const c = evt.choices[idx];
  ensureRomance();
  const did = G.romance.dating;
  if (did && c.affDelta) {
    G.romance.affection[did] = Math.min(100, Math.max(0, (G.romance.affection[did]||0) + c.affDelta));
  }
  if (c.effects) {
    for (const k in c.effects) {
      if (k === 'funds') { G.funds += c.effects[k]; statChanges.funds += c.effects[k]; }
      else if (k === 'reputation') { applyStat('reputation', c.effects[k]); }
      else if (STAT_NAMES[k]) { applyStat(k, c.effects[k]); }
    }
  }
  if (c.replyDialogues && c.replyDialogues.length > 0) {
    dateEventPhase = 'reply';
    dateEventReplyDialogues = c.replyDialogues;
    dateEventReplyIdx = 0;
    advanceDateEvent();
  } else {
    finishDateEvent();
  }
}

function finishDateEvent() {
  document.getElementById('status-event-modal').style.display = 'none';
  currentDateEvent = null;
  playBGM('normal');
  // 결혼 조건 체크
  if (checkMarriageCondition()) {
    showMarriageEvent(() => { if (dateEventCallback) dateEventCallback(); });
    return;
  }
  if (dateEventCallback) dateEventCallback();
}

function checkMarriageCondition() {
  if (G.isMarried || G._pendingWedding) return false;
  ensureRomance();
  const did = G.romance.dating;
  if (!did) return false;
  const aff = G.romance.affection[did] || 0;
  if (aff < 100) return false;
  if ((G.dateCount||0) < 30) return false;
  if (G.housing !== 'apartment' && G.housing !== 'luxury') return false;
  if (Math.random() >= 0.20) return false;
  return true;
}

function showMarriageEvent(callback) {
  ensureRomance();
  const did = G.romance.dating;
  const datingTarget = getRomanceTargets().find(t=>t.id===did);
  const datingName = datingTarget ? datingTarget.name : '연인';
  const datingFace = datingTarget ? datingTarget.face : getPlayerFace();
  window._marriageCallback = callback;
  window._marriageDatingId = did;
  window._marriageDatingName = datingName;
  window._marriageDatingFace = datingFace;

  const modal = document.getElementById('status-event-modal');
  modal.style.display = 'flex';
  document.getElementById('se-bg').style.backgroundImage = "url('배경/식당.webp')";
  document.getElementById('se-face').style.display = 'block';
  document.getElementById('se-face-img').src = getPlayerFace();
  document.getElementById('se-dialog').classList.remove('no-face');
  document.getElementById('se-speaker').textContent = G.name;
  document.getElementById('se-text').textContent = `${datingName}과도 만난지 오래 됐구나. 내 남은 삶을 이 사람과 함께 할 걸 생각해봐야 하지 않을까?`;
  document.getElementById('se-choices').innerHTML = `
    <button class="event-choice" onclick="acceptMarriageProposal()">네</button>
    <button class="event-choice" onclick="declineMarriageProposal()">아니오</button>`;
}

function acceptMarriageProposal() {
  const datingName = window._marriageDatingName;
  const datingFace = window._marriageDatingFace;
  window._marriageDialogueStep = 0;
  const dialogues = [
    {speaker: G.name, face: getPlayerFace(), text: `${datingName}, 할 말이 있어`},
    {speaker: datingName, face: datingFace, text: '무슨 할 말? 갑자기 왜 분위기를 잡아.'},
    {speaker: G.name, face: getPlayerFace(), text: '내가 많이 생각해봤는데, 당신 같은 사람 앞으로 못 만날 것 같아. 남은 삶을 함께해주지 않겠어?'},
    {speaker: datingName, face: datingFace, text: '정말이야?'},
    {speaker: G.name, face: getPlayerFace(), text: '그럼.'},
    {speaker: datingName, face: datingFace, text: '너무 좋아. 나도 당신 없이는 못 살 것 같아! 결혼하자!'},
  ];
  window._marriageDialogues = dialogues;
  showMarriageDialogue();
}

function showMarriageDialogue() {
  const step = window._marriageDialogueStep;
  const dialogues = window._marriageDialogues;
  if (step < dialogues.length) {
    const dlg = dialogues[step];
    document.getElementById('se-face').style.display = 'block';
    document.getElementById('se-face-img').src = dlg.face;
    document.getElementById('se-dialog').classList.remove('no-face');
    document.getElementById('se-speaker').textContent = dlg.speaker;
    document.getElementById('se-text').textContent = dlg.text;
    window._marriageDialogueStep++;
    document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="showMarriageDialogue()">▼ 계속</button>`;
  } else {
    // 프로포즈 완료 → 결혼식 예약 (다음달 둘째주 토요일)
    if (!G.pendingSchedules) G.pendingSchedules = [];
    G.pendingSchedules.push({type:'wedding', target:'2ndSat'});
    G._pendingWedding = true;
    G._weddingPartnerName = window._marriageDatingName;
    G._weddingPartnerFace = window._marriageDatingFace;
    const datingName = window._marriageDatingName;
    document.getElementById('se-face').style.display = 'none';
    document.getElementById('se-dialog').classList.add('no-face');
    document.getElementById('se-speaker').textContent = '';
    document.getElementById('se-text').textContent = `다음 달 결혼식을 올리기로 했다!`;
    document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="document.getElementById('status-event-modal').style.display='none';updateUI();if(window._marriageCallback)window._marriageCallback()">확인</button>`;
  }
}

function declineMarriageProposal() {
  document.getElementById('status-event-modal').style.display = 'none';
  if (window._marriageCallback) window._marriageCallback();
}

// 연애 만남 체크 & vnScenes에 삽입
function checkRomanceEncounters(slot, vnScenes) {
  ensureRomance();
  const targets = getRomanceTargets();
  for (const target of targets) {
    // 연인이 된 사람은 일과 중 만남 이벤트 스킵
    if (G.romance.dating === target.id) continue;
    // 헤어진 사람도 스킵
    if (G.brokenUp && G.brokenUp[target.id]) continue;
    // 연애이벤트 최종단계가 진행된 사람 스킵 (빌드타임에 dating 아직 미설정일 수 있으므로)
    const finalEvents = {minyoung:'minyoung4',eunkyung:'eunkyung4',sarang:'sarang4',seungha:'seungha4',heesun:'heesun4',hyemin:'hyemin4',yeona:'yeona4'};
    if (G.romanceEvents && finalEvents[target.id] && G.romanceEvents[finalEvents[target.id]]) continue;
    // 김혜민: 고시생3 이후 강의시 만남 차단
    if (G.romanceEvents && G.romanceEvents[target.id + '_blocked']) continue;
    for (const enc of target.encounters) {
      if (enc.action !== slot.action) continue;
      if (enc.condition && !enc.condition(slot)) continue;
      if (Math.random() >= enc.prob) continue;
      // 만남 발생!
      vnScenes.push({
        type: 'romance',
        romanceTarget: target,
        actionId: slot.action,
        slotTime: slot.time,
      });
      return; // 한 슬롯당 최대 1명만
    }
  }
}

// 남주인공 연애이벤트 체크 & vnScenes에 삽입
function checkMaleRomanceEvents(slot, vnScenes) {
  if (G.gender !== 'male') return;
  ensureRomance();
  const events = getMaleRomanceEvents();
  for (const evt of events) {
    if (evt.condition && !evt.condition()) continue;

    // triggerAction 매칭
    let actionMatch = false;
    if (evt.triggerAction === '_inhouse_workday') {
      // 사내변호사 평일 일과(document, consult 등) 후 발생
      actionMatch = G.status === 'inhouse' && slot.action && !['homeRest','travel','specialTraining','date'].includes(slot.action) && slot.time !== undefined;
    } else {
      actionMatch = (slot.action === evt.triggerAction);
    }
    if (!actionMatch) continue;

    // 확률
    if (Math.random() >= evt.prob) continue;

    // 승소 요구 체크 (minyoung3)
    if (evt.requireWin) {
      // 최근 승소가 있었는지 체크 — wins를 보고 판단
      // 간소화: 재판 슬롯에서 승소 결과가 있었는지는 직접 알기 어려우므로
      // 승률 기반으로 50% 확률로 "승소한 재판"으로 간주
      if (Math.random() >= 0.5) continue;
    }

    // 이벤트 삽입 + 즉시 마킹 (빌드 타임 중복 방지)
    G.romanceEvents[evt.id] = true;
    vnScenes.push({ type: 'maleRomanceEvent', eventData: evt });
    return; // 한 슬롯당 최대 1개
  }
}

// 여주인공 연애이벤트 체크 & vnScenes에 삽입
function checkFemaleRomanceEvents(slot, vnScenes) {
  if (G.gender !== 'female') return;
  ensureRomance();
  const events = getFemaleRomanceEvents();
  for (const evt of events) {
    if (evt.condition && !evt.condition()) continue;

    // triggerAction 매칭
    let actionMatch = false;
    if (evt.triggerAction === '_immediate') {
      // 즉시 발생 이벤트 (진료상담2, 건물주인연2) - 어떤 액션이든 매칭
      actionMatch = true;
    } else if (evt.triggerAction === '_kimbob_work') {
      // 김&밥 재직 중 서면/상담
      actionMatch = G.firmId === 'kimbob' && (slot.action === 'document' || slot.action === 'consult');
    } else if (evt.triggerAction === '_building_work') {
      // 빌딩 사무실 서면/상담
      actionMatch = G.officeType === 'building' && (slot.action === 'document' || slot.action === 'consult');
    } else if (evt.triggerAction === '_overseas') {
      // 해외여행 (japanTrip/seaTrip/europeTrip)
      actionMatch = (slot.action === 'japanTrip' || slot.action === 'seaTrip' || slot.action === 'europeTrip');
    } else {
      actionMatch = (slot.action === evt.triggerAction);
    }
    if (!actionMatch) continue;

    // 확률
    if (Math.random() >= evt.prob) continue;

    // 승소 요구 체크
    if (evt.requireWin) {
      if (Math.random() >= 0.5) continue;
    }

    // 이벤트 삽입 + 즉시 마킹 (빌드 타임 중복 방지)
    G.romanceEvents[evt.id] = true;
    vnScenes.push({ type: 'femaleRomanceEvent', eventData: evt });
    return; // 한 슬롯당 최대 1개
  }
}

// 남주인공 연애이벤트 씬 표시
let maleRomanceCallback = null;
let maleRomanceDialogueIndex = 0;
let currentMaleRomanceEvent = null;
let maleRomanceExtraDialogues = null; // 추가 대사 (passDialogues, rejectDialogues, confessionDialogues)
let maleRomancePhase = 'main'; // 'main', 'extra', 'confession'

function showMaleRomanceEvent(evtData, cb) {
  ensureRomance();
  maleRomanceCallback = cb;
  maleRomanceDialogueIndex = 0;
  currentMaleRomanceEvent = evtData;
  maleRomanceExtraDialogues = null;
  maleRomancePhase = 'main';

  const modal = document.getElementById('status-event-modal');
  resetModalStyle(true);
  modal.style.display = 'flex';

    document.getElementById('se-face').style.display = 'block';

    document.getElementById('se-dialog').classList.remove('no-face');
  } else {
    document.getElementById('se-face').style.display = 'none';
    document.getElementById('se-dialog').classList.add('no-face');
  }

  advanceMaleRomanceDialogue();
}

function advanceMaleRomanceDialogue() {
  const evt = currentMaleRomanceEvent;
  if (!evt) return;

  let dialogues;
  if (maleRomancePhase === 'main') {
    dialogues = evt.dialogues;
  } else {
    dialogues = maleRomanceExtraDialogues;
  }

  if (maleRomanceDialogueIndex < dialogues.length) {
    const dlg = dialogues[maleRomanceDialogueIndex];
    const speakerText = dlg.speaker.replace(/\{name\}/g, G.name);
    const isPlayer = dlg.speaker === '{name}' || dlg.speaker === G.name;

    // 얼굴 전환
    const faceEl = document.getElementById('se-face');
    const faceImg = document.getElementById('se-face-img');
    if (isPlayer) {
      faceEl.style.display = 'block';
      faceImg.src = getPlayerFace();
      document.getElementById('se-dialog').classList.remove('no-face');
    } else if (evt.extraFaces && evt.extraFaces[dlg.speaker]) {
      faceEl.style.display = 'block';
      faceImg.src = evt.extraFaces[dlg.speaker];
      document.getElementById('se-dialog').classList.remove('no-face');
    } else if (evt.face) {
      faceEl.style.display = 'block';
      faceImg.src = evt.face;
      document.getElementById('se-dialog').classList.remove('no-face');
    }

    document.getElementById('se-speaker').textContent = speakerText;
    document.getElementById('se-text').textContent = dlg.text.replace(/\{name\}/g, G.name);
    maleRomanceDialogueIndex++;
    document.getElementById('se-choices').innerHTML =
      `<button class="event-choice" onclick="advanceMaleRomanceDialogue()">▼ 계속</button>`;
  } else {
    // 대사 끝 — phase에 따라 처리
    if (maleRomancePhase === 'main') {
      // 선택지 표시 or autoPass
      if (evt.autoPass || evt.choices.length === 0) {
        // 자동 진행 (재벌녀1,2)
        G.romanceEvents[evt.id] = true;
        finishMaleRomanceEvent();
      } else {
        showMaleRomanceChoices();
      }
    } else {
      // extra/confession 대사 종료
      finishMaleRomanceEvent();
    }
  }
}

function showMaleRomanceChoices() {
  const evt = currentMaleRomanceEvent;
  if (!evt) return;

  const labels = ['A','B','C'];
  let html = '';
  evt.choices.forEach((c, i) => {
    html += `<button class="event-choice" onclick="applyMaleRomanceChoice(${i})"><span class="choice-label">${labels[i]}.</span> ${c.text}</button>`;
  });

  document.getElementById('se-face').style.display = 'block';
  document.getElementById('se-face-img').src = getPlayerFace();
  document.getElementById('se-dialog').classList.remove('no-face');

  document.getElementById('se-choices').innerHTML = html;
}

function applyMaleRomanceChoice(choiceIdx) {
  const evt = currentMaleRomanceEvent;
  if (!evt) return;
  const choice = evt.choices[choiceIdx];

  G.romanceEvents[evt.id] = true;
  G.romanceChoices[evt.id] = choiceIdx;

  // 선택과 무관하게 만남 차단 (고시생3 등)
  if (evt.blockEncounterAfter) {
    G.romanceEvents[evt.charId + '_blocked'] = true;
    G.romanceEvents[evt.id + '_month'] = G.year * 12 + G.month; // 발생 시점 기록
  }

  if (choice.pass) {
    // 정답 선택
    G.romanceEvents[evt.id + 'pass'] = true;

    // 다음달 스케줄 예약
    if (choice.scheduleNext) {
      if (!G.pendingSchedules) G.pendingSchedules = [];
      G.pendingSchedules.push(choice.scheduleNext);
    }

    if (choice.confessionDialogues) {
      // 고백 대사 진행
      maleRomancePhase = 'confession';
      maleRomanceExtraDialogues = choice.confessionDialogues;
      maleRomanceDialogueIndex = 0;

      // dating 설정은 고백 대사 끝난 후
      if (choice.dating) {
        currentMaleRomanceEvent._pendingDating = choice.dating;
      }
      advanceMaleRomanceDialogue();
    } else if (choice.passDialogues) {
      // 통과 대사 표시
      maleRomancePhase = 'extra';
      maleRomanceExtraDialogues = choice.passDialogues;
      maleRomanceDialogueIndex = 0;
      advanceMaleRomanceDialogue();
    } else {
      finishMaleRomanceEvent();
    }
  } else {
    // 오답 선택 — 체인 종료
    if (choice.rejectDialogues) {
      maleRomancePhase = 'extra';
      maleRomanceExtraDialogues = choice.rejectDialogues;
      maleRomanceDialogueIndex = 0;
      advanceMaleRomanceDialogue();
    } else {
      finishMaleRomanceEvent();
    }
  }
}

function finishMaleRomanceEvent() {
  const evt = currentMaleRomanceEvent;

  // 연인 설정 처리
  if (evt && evt._pendingDating) {
    const datingId = evt._pendingDating;
    G.romance.dating = datingId;
    delete evt._pendingDating;

    // 연인 성립 팝업 표시
    const targets = getRomanceTargets();
    const t = targets.find(x => x.id === datingId);
    const partnerName = t ? t.name : datingId;

    document.getElementById('se-speaker').textContent = '';
    document.getElementById('se-text').innerHTML = `<div style="text-align:center;font-size:1.2rem;font-weight:700;color:#ff8888;margin:16px 0">${partnerName}와(과) 연인이 되었습니다.</div>`;
    document.getElementById('se-choices').innerHTML = `<button class="event-choice" onclick="document.getElementById('status-event-modal').style.display='none';if(window._romanceFinishCb)window._romanceFinishCb()">확인</button>`;
    window._romanceFinishCb = () => {
      currentMaleRomanceEvent = null;
      maleRomanceExtraDialogues = null;
      if (maleRomanceCallback) maleRomanceCallback();
    };
    return;
  }

  // 즉시 발생 이벤트 체이닝 (_immediate)
  const nextImmediate = findImmediateRomanceEvent();
  if (nextImmediate) {
    currentMaleRomanceEvent = null;
    maleRomanceExtraDialogues = null;
    G.romanceEvents[nextImmediate.id] = true;
    showMaleRomanceEvent(nextImmediate, maleRomanceCallback);
    return;
  }

  document.getElementById('status-event-modal').style.display = 'none';
  currentMaleRomanceEvent = null;
  maleRomanceExtraDialogues = null;
  if (maleRomanceCallback) maleRomanceCallback();
}

function findImmediateRomanceEvent() {
  const events = G.gender === 'male' ? getMaleRomanceEvents() : (typeof getFemaleRomanceEvents === 'function' ? getFemaleRomanceEvents() : []);
  for (const evt of events) {
    if (evt.triggerAction !== '_immediate') continue;
    if (evt.condition && !evt.condition()) continue;
    if (G.romanceEvents[evt.id]) continue;
    return evt;
  }
  return null;
}

    document.getElementById('se-text').textContent = dlg.text.replace(/\{name\}/g, G.name);

  } else {

    if (!G.romance.affection[target.id]) G.romance.affection[target.id] = 0;
    G.romance.affection[target.id] = Math.min(100, G.romance.affection[target.id] + gain);

      `<button class="event-choice" onclick="finishRomanceScene()"><span class="choice-label">확인</span></button>`;

function afterBroadcastDecision() {
  // closeSummary 흐름 이어서 진행 (정치, 더블랙, 스카웃, 1월 이벤트 등)
  ensureRomance();
  if (G.month === 1 && G.status !== 'associate' && G.stats.reputation >= 700 && G.hoemu_count >= 10 && !G.politicsAccepted && !G.isCityCouncil) {
    const gameYear = G.year;
    const actualYear = 2029 + gameYear;
    if ((gameYear === 5 || gameYear === 9)) {
      showPoliticsEvent(actualYear);
      return;
    }
  }
  if (G.isBlackFirmFirstMonth) { G.isBlackFirmFirstMonth = false; showBlackFirmEvent(); return; }
  checkScoutOffer();
  if (G.month === 1) { processInvestmentsYearly(); if (G.status === 'inhouse') G.salary += 500000; checkJanuaryEvents(); }
}

function continueExecution() {
  G.monthStatSnapshot={};
  for(const k in G.stats)G.monthStatSnapshot[k]=G.stats[k];
  G.monthStatSnapshot.funds=G.funds; G.monthStatSnapshot.cases=G.cases; G.monthStatSnapshot.preparation=G.preparation;

  execIndex=0; statChanges={};
  for(const k in STAT_NAMES)statChanges[k]=0;
  statChanges.funds=0; statChanges.cases=0; statChanges.preparation=0;

  // 해외여행 첫날 표시 플래그 리셋
  G._japanTripDone = false;
  G._seaTripDone = false;
  G._europeTripDone = false;

  // Build all scenes
  vnScenes = [];
  let allSlots = [];
  let monthInsertedEvents = {}; // 한 달 내 이벤트 중복 방지
  G.schedule.forEach(ds=>{ds.slots.forEach(slot=>{allSlots.push({day:ds.day,dow:ds.dow,isWeekend:ds.isWeekend,...slot});});});

  allSlots.forEach(slot => {
    sceneMilestone = null;
    const scene = buildScene(slot);
    if (scene) {
      if (sceneMilestone) { scene.milestone = sceneMilestone; sceneMilestone = null; }
      vnScenes.push(scene);
    }
    // A. 일반 이벤트 체크
    const generalEvts = getGeneralEvents();
    for (const evt of generalEvts) {
      // 이벤트별 시간 제한
      if (evt.dayOnly && slot.time !== 'day') continue;
      if (evt.eveningOnly && slot.time === 'day') continue;
      if (monthInsertedEvents[evt.id]) continue; // 한 달에 같은 이벤트 중복 방지
      const beforeLen = vnScenes.length;
      checkAndInsertEvent(evt, vnScenes);
      if (vnScenes.length > beforeLen) {
        monthInsertedEvents[evt.id] = true;
      }
    }
    // B. 특정 액션 후 이벤트 체크
    if (slot.action) {
      const actionEvts = getActionEvents(slot.action);
      for (const evt of actionEvts) {
        if (monthInsertedEvents[evt.id]) continue;
        const beforeB = vnScenes.length;
        checkAndInsertEvent(evt, vnScenes);
        if (vnScenes.length > beforeB) monthInsertedEvents[evt.id] = true;
      }
      // 업계모임 후 법학의 신 추가 체크
      if (slot.action === 'industryMeet') {
        const condEvts = getIndustryMeetCondEvents();
        for (const evt of condEvts) {
          checkAndInsertEvent(evt, vnScenes);
        }
      }
    }
    // C+D. 연애이벤트 체크 (특수이벤트가 발생하면 일반 만남 스킵)
    if (slot.action) {
      const beforeLen = vnScenes.length;
      checkMaleRomanceEvents(slot, vnScenes);
      checkFemaleRomanceEvents(slot, vnScenes);
      const specialInserted = vnScenes.length > beforeLen;
      if (!specialInserted) {
        checkRomanceEncounters(slot, vnScenes);
      }
    }
    // 생일 체크 (저녁 슬롯 처리 후)
    if (slot.time === 'evening' || (slot.time === 'all')) {
      if (G.birthday) {
        const bdParts = G.birthday.split('-');
        const bdMonth = parseInt(bdParts[1]);

        if (bdMonth === G.month && bdDay === slot.day) {
          ensureRomance();
          if (G.romance.dating) {
            vnScenes.push({ type:'birthday', day:slot.day });
          }
        }
      }
    }
  });

  document.getElementById('schedule-overlay').style.display='none';
  showVNScene(0);
}

        const diffMod = getDiffModifier(trialCase.difficulty);
